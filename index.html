<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mir Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lekton:wght@400;700&family=Montserrat:wght@800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── IO Brand System v2.1 ─── */
:root {
  --rich-black: #0A0A0A;
  --charcoal: #1A1A1A;
  --mid-gray: #333333;
  --light-gray: #B0B0B0;
  --off-white: #E0E0E0;
  --warm-cream: #F5F0E8;
  --eh: #3D6DF4;
  --sp: #2C9FF4;
  --se: #F46138;
  --pw: #CE2867;
  --grad: linear-gradient(90deg, #CE2867 0%, #F46138 30%, #F4A0A0 50%, #2C9FF4 75%, #3D6DF4 100%);
  --font-display: 'Montserrat', sans-serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'Lekton', 'Source Code Pro', monospace;
  --card-radius: 6px;
  --grid-gap: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--rich-black);
  color: var(--off-white);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ─── Gradient accent bar ─── */
.accent-bar { width: 100%; height: 3px; background: var(--grad); position: fixed; top: 0; left: 0; z-index: 100; }

/* ─── Header ─── */
.header {
  padding: 40px 48px 0;
  position: relative;
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 32px;
}
.logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--light-gray);
}
.logo span { color: var(--eh); }
.header-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(32px, 4vw, 48px);
  color: #fff;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 8px;
}
.header-sub {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--light-gray);
  letter-spacing: 0.04em;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 16px;
}
.theme-toggle {
  background: none;
  border: 1px solid #ffffff20;
  color: var(--light-gray);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}
.theme-toggle:hover { border-color: var(--eh); color: var(--eh); }

/* ─── Tabs ─── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid #ffffff0a;
  padding: 0 48px;
}
.tab {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.06em;
  color: var(--light-gray);
  background: none;
  border: none;
  padding: 14px 24px 12px;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.tab:hover { color: var(--off-white); }
.tab.active { color: #fff; }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--eh);
}
.tab .count {
  font-size: 11px;
  color: #ffffff30;
  margin-left: 8px;
}
.tab.active .count { color: var(--eh); }

/* ─── Toolbar ─── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 48px;
  flex-wrap: wrap;
}
.search-input {
  background: var(--charcoal);
  border: 1px solid #ffffff0a;
  color: var(--off-white);
  font-family: var(--font-body);
  font-size: 13px;
  padding: 8px 16px;
  border-radius: 4px;
  width: 260px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: #ffffff25; }
.search-input:focus { border-color: var(--eh); }

.filter-btn {
  background: none;
  border: 1px solid #ffffff0a;
  color: #ffffff40;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  padding: 7px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--eh);
  color: var(--eh);
}
.toolbar-spacer { flex: 1; }
.view-mode {
  display: flex;
  gap: 4px;
}
.view-btn {
  background: none;
  border: 1px solid #ffffff0a;
  color: #ffffff30;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.view-btn:hover, .view-btn.active { border-color: #ffffff20; color: var(--off-white); }
.view-btn svg { width: 14px; height: 14px; }

/* ─── Grid ─── */
.gallery-container { padding: 8px 48px 80px; }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--grid-gap);
}
.card-grid.large {
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
}

/* ─── Reference Card ─── */
.ref-card {
  background: var(--charcoal);
  border-radius: var(--card-radius);
  overflow: hidden;
  border: 1px solid #ffffff06;
  cursor: pointer;
  transition: border-color 0.25s, transform 0.25s;
  position: relative;
}
.ref-card:hover {
  border-color: #ffffff14;
  transform: translateY(-2px);
}
.ref-card-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
  background: #0f0f0f;
}
.ref-card-meta {
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.ref-card-name {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #ffffff30;
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70%;
}
.ref-card-tags {
  display: flex;
  gap: 6px;
}
.tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  padding: 2px 8px;
  border-radius: 3px;
  background: #ffffff08;
  color: #ffffff35;
}
.tag.eh { background: #3D6DF415; color: #3D6DF4; }
.tag.se { background: #F4613815; color: #F46138; }
.tag.pw { background: #CE286715; color: #CE2867; }
.tag.sp { background: #2C9FF415; color: #2C9FF4; }

/* ─── Artifact Card ─── */
.artifact-card {
  background: var(--charcoal);
  border-radius: var(--card-radius);
  overflow: hidden;
  border: 1px solid #ffffff06;
  cursor: pointer;
  transition: border-color 0.25s, transform 0.25s;
}
.artifact-card:hover {
  border-color: #ffffff14;
  transform: translateY(-2px);
}
.artifact-preview {
  width: 100%;
  aspect-ratio: 16/10;
  background: #0c0c0c;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.artifact-preview iframe {
  width: 100%;
  height: 100%;
  border: none;
  pointer-events: none;
}
.artifact-preview .placeholder {
  font-family: var(--font-mono);
  font-size: 12px;
  color: #ffffff15;
  letter-spacing: 0.06em;
}
.artifact-status {
  position: absolute;
  top: 10px;
  right: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
}
.artifact-status.wip { background: #F4613825; color: var(--se); }
.artifact-status.draft { background: #ffffff10; color: var(--light-gray); }
.artifact-status.stable { background: #4CD47C20; color: #4CD47C; }

.artifact-info { padding: 14px 16px; }
.artifact-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 15px;
  color: #fff;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.artifact-desc {
  font-size: 12px;
  color: var(--light-gray);
  line-height: 1.5;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.artifact-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.artifact-date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #ffffff20;
  letter-spacing: 0.03em;
}
.artifact-tags { display: flex; gap: 6px; }

/* ─── Empty state ─── */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 120px 40px;
}
.empty-state-icon {
  font-family: var(--font-display);
  font-size: 48px;
  color: #ffffff08;
  margin-bottom: 16px;
}
.empty-state-text {
  font-family: var(--font-mono);
  font-size: 13px;
  color: #ffffff20;
  letter-spacing: 0.04em;
  line-height: 1.8;
}
.empty-state-text code {
  background: #ffffff08;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--font-mono);
  color: #ffffff35;
}

/* ─── Lightbox ─── */
.lightbox {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 48px;
  cursor: pointer;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 4px;
}
.lightbox-close {
  position: absolute;
  top: 24px;
  right: 32px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: #ffffff40;
  background: none;
  border: none;
  cursor: pointer;
  letter-spacing: 0.06em;
}
.lightbox-close:hover { color: #fff; }

/* ─── Footer ─── */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid #ffffff06;
  background: var(--rich-black);
  z-index: 50;
}
.footer-left {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #ffffff15;
  letter-spacing: 0.04em;
}
.footer-right {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #ffffff10;
}
.footer-right span { color: var(--eh); opacity: 0.4; }

/* ─── Light mode ─── */
body.light {
  background: var(--warm-cream);
  color: var(--mid-gray);
}
body.light .header-title { color: #000; }
body.light .header-sub { color: #999; }
body.light .logo { color: #999; }
body.light .tab { color: #999; }
body.light .tab.active { color: #000; }
body.light .tab .count { color: #00000020; }
body.light .tab.active .count { color: var(--eh); }
body.light .tabs { border-color: #00000008; }
body.light .search-input {
  background: #fff;
  border-color: #D0C9BD44;
  color: var(--mid-gray);
}
body.light .search-input::placeholder { color: #00000020; }
body.light .filter-btn { border-color: #D0C9BD44; color: #00000030; }
body.light .filter-btn:hover, body.light .filter-btn.active { border-color: var(--eh); color: var(--eh); }
body.light .view-btn { border-color: #D0C9BD44; color: #00000020; }
body.light .view-btn:hover, body.light .view-btn.active { color: var(--mid-gray); }
body.light .ref-card, body.light .artifact-card {
  background: #fff;
  border-color: #D0C9BD30;
}
body.light .ref-card:hover, body.light .artifact-card:hover { border-color: #D0C9BD88; }
body.light .ref-card-name { color: #00000030; }
body.light .tag { background: #00000006; color: #00000030; }
body.light .artifact-title { color: #000; }
body.light .artifact-desc { color: #666; }
body.light .artifact-date { color: #00000020; }
body.light .artifact-preview { background: #f0ece4; }
body.light .artifact-preview .placeholder { color: #00000010; }
body.light .empty-state-icon { color: #00000008; }
body.light .empty-state-text { color: #00000025; }
body.light .empty-state-text code { background: #00000006; color: #00000035; }
body.light .footer { background: var(--warm-cream); border-color: #D0C9BD20; }
body.light .footer-left { color: #00000015; }
body.light .footer-right { color: #00000010; }
body.light .theme-toggle { border-color: #D0C9BD44; color: #999; }
body.light .theme-toggle:hover { border-color: var(--eh); color: var(--eh); }

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .header, .tabs, .toolbar, .gallery-container { padding-left: 24px; padding-right: 24px; }
  .footer { padding-left: 24px; padding-right: 24px; }
  .card-grid { grid-template-columns: 1fr 1fr; }
  .search-input { width: 100%; }
}
@media (max-width: 480px) {
  .card-grid, .card-grid.large { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="accent-bar"></div>

<header class="header">
  <div class="header-top">
    <div>
      <div class="logo">ø co. <span>/ mir</span></div>
      <h1 class="header-title">Mir Gallery</h1>
      <p class="header-sub">/01 visualization workbench</p>
    </div>
    <div class="header-controls">
      <button class="theme-toggle" onclick="toggleTheme()">◐ mode</button>
    </div>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="references" onclick="switchTab('references')">
    References <span class="count" id="ref-count">0</span>
  </button>
  <button class="tab" data-tab="artifacts" onclick="switchTab('artifacts')">
    Artifacts <span class="count" id="artifact-count">0</span>
  </button>
</nav>

<div class="toolbar">
  <input class="search-input" type="text" placeholder="search…" oninput="filterCards(this.value)">
  <div id="tag-filters"></div>
  <div class="toolbar-spacer"></div>
  <div class="view-mode">
    <button class="view-btn active" onclick="setView('grid')" title="Grid">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="5" height="5"/><rect x="8" y="1" width="5" height="5"/><rect x="1" y="8" width="5" height="5"/><rect x="8" y="8" width="5" height="5"/></svg>
    </button>
    <button class="view-btn" onclick="setView('large')" title="Large">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="12" height="5.5"/><rect x="1" y="7.5" width="12" height="5.5"/></svg>
    </button>
  </div>
</div>

<main class="gallery-container">
  <!-- References grid -->
  <div class="card-grid" id="references-grid"></div>
  <!-- Artifacts grid -->
  <div class="card-grid" id="artifacts-grid" style="display:none;"></div>
</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">ESC</button>
  <img id="lightbox-img" src="" alt="">
</div>

<footer class="footer">
  <div class="footer-left">mir gallery · v0.1</div>
  <div class="footer-right"><span>ø</span></div>
</footer>

<script>
// ─── DATA ───
// References: add entries here or load from references.json
const REFERENCES = [
  // Example entry — replace/extend with your actual references:
  // { file: "references/010174be7b366ba8caafae676b0c12f5.jpg", tags: ["schematics", "notation"], name: "Scientific primitives sampler" },
];

// Artifacts: add entries here or load from artifacts.json
const ARTIFACTS = [
  // Example entry:
  // { file: "artifacts/helix-visualizer.html", title: "Helix Visualizer", desc: "Five-view interactive HELIX explorer — orbit, tide, field, signal, strand.", tags: ["helix", "lattice", "interactive"], status: "wip", date: "2026-03-24", thumb: "artifacts/thumbs/helix-visualizer.png" },
];

// ─── STATE ───
let currentTab = 'references';
let currentView = 'grid';
let searchQuery = '';
let activeTagFilter = null;

// ─── RENDER ───
function render() {
  renderReferences();
  renderArtifacts();
  renderTagFilters();
  document.getElementById('ref-count').textContent = REFERENCES.length;
  document.getElementById('artifact-count').textContent = ARTIFACTS.length;
}

function renderReferences() {
  const grid = document.getElementById('references-grid');
  const filtered = filterData(REFERENCES, 'name');

  if (filtered.length === 0 && REFERENCES.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">ø</div>
        <div class="empty-state-text">
          No references yet.<br>
          Add images to <code>references/</code> and register them in <code>index.html</code>
        </div>
      </div>`;
    return;
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-text">No matches.</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(ref => `
    <div class="ref-card" onclick="openLightbox('${ref.file}')">
      <img class="ref-card-img" src="${ref.file}" alt="${ref.name || ''}" loading="lazy">
      <div class="ref-card-meta">
        <span class="ref-card-name">${ref.name || ref.file.split('/').pop()}</span>
        <div class="ref-card-tags">
          ${(ref.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderArtifacts() {
  const grid = document.getElementById('artifacts-grid');
  const filtered = filterData(ARTIFACTS, 'title');

  if (filtered.length === 0 && ARTIFACTS.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">ø</div>
        <div class="empty-state-text">
          No artifacts yet.<br>
          Drop a visualization into <code>artifacts/</code> and register it here.
        </div>
      </div>`;
    return;
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-text">No matches.</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(a => `
    <div class="artifact-card" onclick="window.open('${a.file}', '_blank')">
      <div class="artifact-preview">
        ${a.thumb
          ? `<img src="${a.thumb}" style="width:100%;height:100%;object-fit:cover;">`
          : `<span class="placeholder">⟨ preview ⟩</span>`}
        <span class="artifact-status ${a.status}">${a.status}</span>
      </div>
      <div class="artifact-info">
        <div class="artifact-title">${a.title}</div>
        <div class="artifact-desc">${a.desc || ''}</div>
        <div class="artifact-footer">
          <span class="artifact-date">${a.date || ''}</span>
          <div class="artifact-tags">
            ${(a.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderTagFilters() {
  const data = currentTab === 'references' ? REFERENCES : ARTIFACTS;
  const allTags = [...new Set(data.flatMap(d => d.tags || []))].sort();
  const container = document.getElementById('tag-filters');
  container.innerHTML = allTags.map(t =>
    `<button class="filter-btn ${activeTagFilter === t ? 'active' : ''}" onclick="toggleTag('${t}')">${t}</button>`
  ).join('');
}

// ─── INTERACTIONS ───
function switchTab(tab) {
  currentTab = tab;
  activeTagFilter = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('references-grid').style.display = tab === 'references' ? '' : 'none';
  document.getElementById('artifacts-grid').style.display = tab === 'artifacts' ? '' : 'none';
  renderTagFilters();
}

function filterCards(query) {
  searchQuery = query.toLowerCase();
  render();
}

function filterData(data, nameKey) {
  return data.filter(d => {
    const matchesSearch = !searchQuery ||
      (d[nameKey] || '').toLowerCase().includes(searchQuery) ||
      (d.tags || []).some(t => t.toLowerCase().includes(searchQuery)) ||
      (d.desc || '').toLowerCase().includes(searchQuery);
    const matchesTag = !activeTagFilter || (d.tags || []).includes(activeTagFilter);
    return matchesSearch && matchesTag;
  });
}

function toggleTag(tag) {
  activeTagFilter = activeTagFilter === tag ? null : tag;
  render();
}

function setView(mode) {
  currentView = mode;
  document.querySelectorAll('.view-btn').forEach((b, i) => b.classList.toggle('active', (i === 0 && mode === 'grid') || (i === 1 && mode === 'large')));
  document.querySelectorAll('.card-grid').forEach(g => g.classList.toggle('large', mode === 'large'));
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function toggleTheme() {
  document.body.classList.toggle('light');
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// Init
render();
</script>
</body>
</html>
