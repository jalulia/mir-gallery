<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daytona v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lekton:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; overflow: hidden; font-family: 'Lekton', monospace; cursor: crosshair; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #hud { position: fixed; top: 24px; left: 32px; z-index: 10; pointer-events: none; }
  #hud h1 { font-size: 11px; font-weight: 700; color: #3D6DF4; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px; }
  #hud p { font-size: 10px; color: #ffffff15; letter-spacing: 0.08em; text-transform: uppercase; }
  #telemetry { position: fixed; bottom: 24px; left: 32px; z-index: 10; pointer-events: none; }
  #telemetry p { font-size: 10px; color: #F4613830; letter-spacing: 0.06em; font-variant-numeric: tabular-nums; }
  #speed { position: fixed; top: 24px; right: 32px; z-index: 10; pointer-events: none; text-align: right; }
  #speed p { font-size: 10px; color: #3D6DF420; letter-spacing: 0.06em; }

  /* Drop zone */
  #dropZone {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 20; display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    transition: background 0.2s;
  }
  #dropZone.active { pointer-events: auto; }
  #dropZone.dragover { background: rgba(61,109,244,0.04); }
  #dropZone p {
    font-size: 12px; color: #3D6DF4; letter-spacing: 0.12em;
    text-transform: uppercase; opacity: 0.12;
    border: 1px dashed #3D6DF420; padding: 16px 32px; border-radius: 6px;
    transition: all 0.2s; cursor: pointer; pointer-events: auto;
  }
  #dropZone p:hover { opacity: 0.3; border-color: #3D6DF450; }
  #dropZone.dragover p { opacity: 0.4; border-color: #3D6DF4; }
  #dropZone.loaded { display: none; }

  /* Transport bar */
  #transport {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 15; display: none; align-items: center; gap: 12px;
    padding: 8px 20px; border-radius: 6px;
    background: rgba(10,10,10,0.5);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid #ffffff06;
  }
  #transport.visible { display: flex; }
  #transport * { font-family: 'Lekton', monospace; }
  #trackName {
    font-size: 10px; color: #ffffff20; letter-spacing: 0.06em;
    max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #playBtn {
    background: none; border: none; color: #3D6DF4; font-size: 14px;
    cursor: pointer; padding: 2px 6px; opacity: 0.5; transition: opacity 0.2s;
  }
  #playBtn:hover { opacity: 1; }
  #progressWrap {
    width: 180px; height: 16px; display: flex; align-items: center;
    cursor: pointer; position: relative;
  }
  #progressTrack {
    width: 100%; height: 2px; background: #ffffff10; border-radius: 1px;
    position: relative; overflow: hidden;
  }
  #progressFill {
    height: 100%; background: #3D6DF4; width: 0%; border-radius: 1px;
    transition: width 0.1s linear;
  }
  #timeDisplay {
    font-size: 10px; color: #ffffff15; letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  #volumeCtrl {
    width: 50px; height: 2px; -webkit-appearance: none; appearance: none;
    background: #ffffff10; border-radius: 1px; outline: none; cursor: pointer;
  }
  #volumeCtrl::-webkit-slider-thumb {
    -webkit-appearance: none; width: 8px; height: 8px;
    background: #3D6DF4; border-radius: 50%; cursor: pointer;
  }

  /* Band meters */
  #meters {
    position: fixed; bottom: 50px; left: 32px; z-index: 10;
    display: none; gap: 3px; align-items: flex-end; height: 30px;
    pointer-events: none;
  }
  #meters.visible { display: flex; }
  .meter-bar {
    width: 4px; border-radius: 1px; min-height: 1px;
    transition: height 0.08s ease-out;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <h1>ø co. / daytona v2</h1>
  <p>audio-reactive orbital trajectories</p>
</div>
<div id="telemetry">
  <p id="telText">bodies: 00 · phase: 0.000</p>
</div>
<div id="speed">
  <p id="speedText">v: 0.00</p>
</div>

<div id="dropZone" class="active">
  <p onclick="document.getElementById('filePicker').click()">drop audio file</p>
</div>
<input type="file" id="filePicker" accept="audio/*" style="display:none">

<div id="transport">
  <span id="trackName">---</span>
  <button id="playBtn">&#9654;</button>
  <div id="progressWrap" onclick="seekAudio(event)">
    <div id="progressTrack"><div id="progressFill"></div></div>
  </div>
  <span id="timeDisplay">0:00 / 0:00</span>
  <input type="range" id="volumeCtrl" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
</div>

<div id="meters">
  <div class="meter-bar" style="background:#F46138;"></div>
  <div class="meter-bar" style="background:#F46138;"></div>
  <div class="meter-bar" style="background:#3D6DF4;"></div>
  <div class="meter-bar" style="background:#CE2867;"></div>
  <div class="meter-bar" style="background:#2C9FF4;"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const telText = document.getElementById('telText');
const speedText = document.getElementById('speedText');
let W, H, mx, my, smx, smy, t = 0;

const EH = '#3D6DF4';
const SE = '#F46138';
const PW = '#CE2867';
const SP = '#2C9FF4';

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
addEventListener('resize', resize); resize();
mx = W/2; my = H/2; smx = mx; smy = my;
addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
addEventListener('touchmove', e => { mx = e.touches[0].clientX; my = e.touches[0].clientY; e.preventDefault(); }, { passive: false });

// --- AUDIO ENGINE ---
const audio = {
  ctx: null,
  analyser: null,
  source: null,
  element: null,
  freqData: null,
  bands: { bass: 0, lowMid: 0, mid: 0, high: 0, energy: 0 },
  smoothed: { bass: 0, lowMid: 0, mid: 0, high: 0, energy: 0 },
  isLoaded: false,
  fileName: '',

  init(file) {
    // Cleanup previous
    if (this.element) {
      this.element.pause();
      if (this.source) this.source.disconnect();
      URL.revokeObjectURL(this.element.src);
    }

    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    this.ctx.resume();

    this.element = new Audio();
    this.element.crossOrigin = 'anonymous';
    this.element.src = URL.createObjectURL(file);
    this.fileName = file.name.replace(/\.[^.]+$/, '');

    this.source = this.ctx.createMediaElementSource(this.element);
    this.analyser = this.ctx.createAnalyser();
    this.analyser.fftSize = 2048;
    this.analyser.smoothingTimeConstant = 0.8;

    this.source.connect(this.analyser);
    this.analyser.connect(this.ctx.destination);

    this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
    this.isLoaded = true;

    // UI updates
    document.getElementById('dropZone').classList.add('loaded');
    document.getElementById('transport').classList.add('visible');
    document.getElementById('meters').classList.add('visible');
    document.getElementById('trackName').textContent = this.fileName;

    this.element.volume = parseFloat(document.getElementById('volumeCtrl').value);
    this.element.play();
    document.getElementById('playBtn').innerHTML = '&#9646;&#9646;';
  },

  update() {
    if (!this.isLoaded || !this.analyser) return;

    this.analyser.getByteFrequencyData(this.freqData);
    const binHz = this.ctx.sampleRate / this.analyser.fftSize;

    // Bin ranges
    const bassEnd = Math.round(250 / binHz);
    const lowMidEnd = Math.round(1000 / binHz);
    const midEnd = Math.round(4000 / binHz);
    const highEnd = Math.min(Math.round(20000 / binHz), this.freqData.length);

    function avgRange(data, from, to) {
      let sum = 0;
      const count = Math.max(1, to - from);
      for (let i = from; i < to; i++) sum += data[i];
      return (sum / count) / 255;
    }

    const raw = {
      bass: avgRange(this.freqData, 1, bassEnd),
      lowMid: avgRange(this.freqData, bassEnd, lowMidEnd),
      mid: avgRange(this.freqData, lowMidEnd, midEnd),
      high: avgRange(this.freqData, midEnd, highEnd),
      energy: avgRange(this.freqData, 0, this.freqData.length),
    };

    // Exponential smoothing — bass gets heavier smoothing to avoid pump
    const s = this.smoothed;
    s.bass = s.bass * 0.88 + raw.bass * 0.12;
    s.lowMid = s.lowMid * 0.85 + raw.lowMid * 0.15;
    s.mid = s.mid * 0.85 + raw.mid * 0.15;
    s.high = s.high * 0.82 + raw.high * 0.18;
    s.energy = s.energy * 0.85 + raw.energy * 0.15;

    // Copy to bands
    this.bands.bass = s.bass;
    this.bands.lowMid = s.lowMid;
    this.bands.mid = s.mid;
    this.bands.high = s.high;
    this.bands.energy = s.energy;
  }
};

// --- FILE INPUT ---
const dropZone = document.getElementById('dropZone');
const filePicker = document.getElementById('filePicker');

document.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
document.addEventListener('dragleave', e => {
  if (e.relatedTarget === null || !document.contains(e.relatedTarget)) dropZone.classList.remove('dragover');
});
document.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio/')) audio.init(file);
});
filePicker.addEventListener('change', e => {
  if (e.target.files[0]) audio.init(e.target.files[0]);
});

// --- TRANSPORT ---
document.getElementById('playBtn').addEventListener('click', () => {
  if (!audio.element) return;
  if (audio.element.paused) {
    audio.ctx.resume();
    audio.element.play();
    document.getElementById('playBtn').innerHTML = '&#9646;&#9646;';
  } else {
    audio.element.pause();
    document.getElementById('playBtn').innerHTML = '&#9654;';
  }
});

function seekAudio(e) {
  if (!audio.element) return;
  const rect = document.getElementById('progressWrap').getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.element.currentTime = pct * audio.element.duration;
}

function setVolume(v) {
  if (audio.element) audio.element.volume = parseFloat(v);
}

function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}

function updateTransport() {
  if (!audio.element || !audio.isLoaded) return;
  const cur = audio.element.currentTime;
  const dur = audio.element.duration || 0;
  document.getElementById('progressFill').style.width = dur ? `${(cur / dur) * 100}%` : '0%';
  document.getElementById('timeDisplay').textContent = `${fmtTime(cur)} / ${fmtTime(dur)}`;

  // Band meters
  const bars = document.querySelectorAll('.meter-bar');
  const vals = [audio.bands.bass, audio.bands.lowMid, audio.bands.mid, audio.bands.high, audio.bands.energy];
  vals.forEach((v, i) => { bars[i].style.height = `${Math.max(1, v * 28)}px`; });
}

// --- ORBITAL BODIES ---
class Body {
  constructor(i, total) {
    this.i = i;
    this.total = total;
    this.orbitR = 80 + i * 28;
    this.speed = 0.3 + (total - i) * 0.06;
    this.phase = (i / total) * Math.PI * 2;
    this.size = 2 + Math.random() * 3;
    this.color = i % 3 === 0 ? SE : i % 3 === 1 ? EH : SP;
    this.trail = [];
    this.trailMax = 120 + i * 8;
    this.tilt = 0.3 + i * 0.08;
    this.wobble = 0.5 + Math.random() * 0.5;
  }

  update(cx, cy, influence) {
    const a = t * this.speed + this.phase;
    const r = this.orbitR * (0.8 + influence * 0.4);
    const helixX = cx + Math.cos(a) * r * Math.cos(this.tilt);
    const helixY = cy + Math.sin(a) * r * 0.5;
    const wave = Math.sin(a * 2 + this.phase) * 15 * this.wobble * (1 + influence);
    this.x = helixX + wave;
    this.y = helixY + Math.cos(a) * r * Math.sin(this.tilt) * 0.3;
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.trailMax) this.trail.shift();
  }

  draw() {
    const highBoost = audio.bands.high;
    if (this.trail.length > 1) {
      for (let i = 1; i < this.trail.length; i++) {
        const p = this.trail[i - 1];
        const c = this.trail[i];
        const alpha = (i / this.trail.length) * (0.4 + highBoost * 0.3);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(c.x, c.y);
        ctx.strokeStyle = this.color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = 0.06 + audio.bands.bass * 0.06;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// --- WAVE SYSTEM ---
const WAVE_BANDS = ['bass', 'lowMid', 'mid'];

class Wave {
  constructor(i) {
    this.i = i;
    this.freq = 1.5 + i * 0.8;
    this.amp = 40 + i * 15;
    this.phase = i * 1.2;
    this.color = i === 0 ? SE : i === 1 ? EH : PW;
    this.lw = i === 0 ? 1.5 : 1;
  }

  draw(cx, cy, w, influence) {
    const bandBoost = audio.bands[WAVE_BANDS[this.i]] || 0;
    ctx.beginPath();
    const segments = 200;
    for (let j = 0; j <= segments; j++) {
      const x = cx - w / 2 + (j / segments) * w;
      const phase = t * (1.5 + this.i * 0.3) + this.phase;
      const envelope = Math.sin((j / segments) * Math.PI);
      const y = cy + Math.sin(j * this.freq * 0.03 + phase) * this.amp * envelope * (0.6 + influence * 0.6 + bandBoost * 0.5);
      if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.lw + influence * 0.5 + bandBoost * 0.5;
    ctx.globalAlpha = 0.35 + influence * 0.4 + bandBoost * 0.2;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// --- VERTICAL INTERFERENCE LINES ---
function drawInterference(cx, cy, w, h, influence) {
  const n = 40;
  for (let i = 0; i < n; i++) {
    const x = cx - w / 2 + (i / n) * w;
    const wave1 = Math.sin(i * 0.15 + t * 1.5) * 0.5 + 0.5;
    const wave2 = Math.sin(i * 0.25 + t * 1.2 + 1) * 0.5 + 0.5;
    const combined = wave1 * wave2;
    const lineH = combined * h * 0.4 * (0.5 + influence * 0.8);
    ctx.beginPath();
    ctx.moveTo(x, cy - lineH);
    ctx.lineTo(x, cy + lineH);
    ctx.strokeStyle = EH;
    ctx.globalAlpha = combined * 0.15 + influence * 0.1;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// --- RADIAL BURST ---
function drawConvergence(x, y, influence) {
  const n = 16;
  const r = 80 + influence * 40;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + t * 0.05;
    const len = r * (0.5 + Math.sin(t * 0.8 + i * 0.5) * 0.3);
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(a) * 8, y + Math.sin(a) * 8);
    ctx.lineTo(x + Math.cos(a) * len, y + Math.sin(a) * len);
    ctx.strokeStyle = i % 4 === 0 ? SE : `rgba(255,255,255,${0.03 + influence * 0.04})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.arc(x, y, 3 + influence * 3, 0, Math.PI * 2);
  ctx.fillStyle = SE;
  ctx.globalAlpha = 0.6 + influence * 0.4;
  ctx.fill();
  ctx.globalAlpha = 1;
}

// --- STARS ---
const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({ x: Math.random() * 2, y: Math.random(), s: 0.3 + Math.random() * 1.2, b: Math.random() });
}

function drawStars() {
  const hi = audio.bands.high;
  for (const s of stars) {
    const x = s.x * W;
    const y = s.y * H;
    const flicker = 0.3 + Math.sin(t * (2 + hi * 4) + s.b * 10) * 0.2;
    ctx.beginPath();
    ctx.arc(x, y, s.s, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = flicker * (0.15 + hi * 0.2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- INIT ---
const NUM_BODIES = 9;
const bodies = [];
for (let i = 0; i < NUM_BODIES; i++) bodies.push(new Body(i, NUM_BODIES));
const waves = [new Wave(0), new Wave(1), new Wave(2)];

// --- SUN ---
function drawSun(x, y, influence) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, 40 + influence * 20);
  grad.addColorStop(0, 'rgba(244,97,56,0.4)');
  grad.addColorStop(0.5, 'rgba(244,97,56,0.08)');
  grad.addColorStop(1, 'rgba(244,97,56,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x - 80, y - 80, 160, 160);
  ctx.beginPath();
  ctx.arc(x, y, 8 + influence * 3, 0, Math.PI * 2);
  ctx.fillStyle = SE;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, 14 + Math.sin(t) * 2 + influence * 4, 0, Math.PI * 2);
  ctx.strokeStyle = SE;
  ctx.globalAlpha = 0.2;
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// --- FORWARD BEAM ---
function drawBeam(sx, sy, influence) {
  const grad = ctx.createLinearGradient(sx, sy, W, sy);
  grad.addColorStop(0, 'rgba(244,161,56,0.25)');
  grad.addColorStop(0.4, 'rgba(244,161,56,0.06)');
  grad.addColorStop(1, 'rgba(244,161,56,0)');
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.3 + influence * 0.3;
  ctx.fillRect(sx, sy - 1, W - sx, 2);
  ctx.globalAlpha = 1;
}

// --- INFLUENCE (mouse + audio) ---
function getInf(cx, cy, band) {
  const d = Math.sqrt((smx - cx) ** 2 + (smy - cy) ** 2);
  const mouseInf = Math.max(0, 1 - d / 500);
  const audioInf = band ? (audio.bands[band] || 0) : audio.bands.energy;
  return Math.min(1, Math.max(mouseInf, audioInf));
}

// --- MAIN LOOP ---
function animate() {
  audio.update();
  t += 0.016 * (1 + audio.bands.energy * 0.5);
  smx += (mx - smx) * 0.06;
  smy += (my - smy) * 0.06;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, W, H);

  const sunX = W * 0.22;
  const sunY = H * 0.48;
  const convX = W * 0.82;
  const convY = H * 0.48;
  const waveY = H * 0.48;

  const sunInf = getInf(sunX, sunY, 'bass');
  const convInf = getInf(convX, convY, 'mid');
  const midInf = getInf(W * 0.5, H * 0.5, 'lowMid');

  drawStars();
  drawBeam(sunX + 10, sunY, sunInf);
  drawInterference(W * 0.55, waveY, W * 0.45, H * 0.6, midInf);

  for (const wave of waves) {
    wave.draw(W * 0.5, waveY, W * 0.65, midInf);
  }

  for (const body of bodies) {
    body.update(sunX, sunY, sunInf);
    body.draw();
  }

  drawSun(sunX, sunY, sunInf);
  drawConvergence(convX, convY, convInf);

  // Cursor
  ctx.beginPath();
  ctx.arc(smx, smy, 16 + Math.sin(t * 2) * 3, 0, Math.PI * 2);
  ctx.strokeStyle = EH; ctx.lineWidth = 0.6; ctx.globalAlpha = 0.3; ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.arc(smx, smy, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = SE; ctx.fill();

  // HUD
  const vel = Math.sqrt((mx - smx) ** 2 + (my - smy) ** 2);
  if (audio.isLoaded && !audio.element.paused) {
    telText.textContent = `bodies: ${String(NUM_BODIES).padStart(2, '0')} · bass: ${audio.bands.bass.toFixed(2)} · mid: ${audio.bands.mid.toFixed(2)}`;
  } else {
    telText.textContent = `bodies: ${String(NUM_BODIES).padStart(2, '0')} · phase: ${(t % (Math.PI * 2)).toFixed(3)}`;
  }
  speedText.textContent = `v: ${vel.toFixed(2)}`;

  updateTransport();
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
