<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mir 818 — Complete Visualization Suite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lekton:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; }
:root { --primary: #3D6DF4; --coral: #F46138; --magenta: #CE2867; --chris: #4488FF; --julia: #FF8855; --bg: #0A0A0A; }
body { background: var(--bg); font-family: 'Lekton', monospace; color: rgba(255,255,255,0.8); overflow: hidden; }

/* SIDEBAR */
#sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; background: rgba(10,10,10,0.97); backdrop-filter: blur(16px); border-right: 1px solid rgba(255,255,255,0.04); padding: 20px; overflow-y: auto; z-index: 20; }
#sidebar h1 { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--primary); margin-bottom: 4px; }
.subtitle { font-size: 9px; color: rgba(255,255,255,0.22); margin-bottom: 20px; line-height: 1.6; }
.section-title { font-family: 'Inter', sans-serif; font-size: 8px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin: 16px 0 8px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.03); }
.btn-sm { flex: 1; padding: 6px 8px; font-family: 'Inter'; font-size: 8px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); color: rgba(255,255,255,0.35); border-radius: 3px; cursor: pointer; transition: all 0.15s; }
.btn-sm:hover { border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.04); }
.btn-sm.active { border-color: var(--primary); background: rgba(61,109,244,0.08); color: var(--primary); }
.btn-row { display: flex; gap: 3px; margin-bottom: 10px; }
.toggle-btn { display: flex; align-items: center; gap: 7px; padding: 5px 9px; border: 1px solid rgba(255,255,255,0.05); border-radius: 3px; background: transparent; color: rgba(255,255,255,0.35); font-family: 'Lekton'; font-size: 9px; cursor: pointer; width: 100%; margin-bottom: 3px; transition: all 0.15s; }
.toggle-btn.active { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }
.indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.color-mode { display: flex; gap: 2px; margin-bottom: 8px; }
.color-mode button { flex: 1; padding: 5px 0; font-family: 'Lekton'; font-size: 8px; letter-spacing: 0.05em; text-transform: uppercase; background: transparent; border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.25); border-radius: 3px; cursor: pointer; transition: all 0.15s; }
.color-mode button.active { border-color: var(--primary); color: var(--primary); background: rgba(61,109,244,0.04); }
input[type="text"], input[type="number"] { width: 100%; padding: 6px 8px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); color: rgba(255,255,255,0.8); font-family: 'Lekton'; font-size: 9px; border-radius: 3px; margin-bottom: 8px; }
input:focus { outline: none; border-color: var(--primary); }

/* CANVAS & VIEWS */
#three-container { position: fixed; left: 260px; top: 0; right: 0; bottom: 0; background: var(--bg); }
#canvas-helix { position: fixed; left: 260px; top: 0; right: 0; bottom: 0; display: none; }

/* VIEW TOGGLE */
#view-toggle { position: fixed; top: 16px; left: 276px; z-index: 15; display: flex; gap: 2px; background: rgba(10,10,10,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.04); border-radius: 4px; padding: 2px; }
.view-btn { padding: 6px 12px; font-family: 'Inter'; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; background: transparent; border: none; color: rgba(255,255,255,0.35); cursor: pointer; border-radius: 2px; transition: all 0.15s; }
.view-btn.active { background: var(--primary); color: white; }

/* HUD */
#hud { position: fixed; top: 16px; right: 16px; z-index: 10; font-size: 8px; letter-spacing: 0.06em; text-align: right; color: rgba(255,255,255,0.35); line-height: 1.7; pointer-events: none; }

/* TOOLTIP */
#tooltip { position: fixed; z-index: 30; pointer-events: none; background: rgba(6,6,6,0.96); border: 1px solid rgba(255,255,255,0.07); border-radius: 4px; padding: 9px 11px; font-size: 9px; line-height: 1.6; display: none; max-width: 280px; backdrop-filter: blur(12px); }
#tooltip .tt-id { color: var(--primary); font-weight: 700; }
#tooltip .tt-meta { color: rgba(255,255,255,0.5); font-size: 8px; margin-top: 4px; }

/* DETAIL PANEL */
#detail-panel { position: fixed; right: -320px; top: 0; bottom: 0; width: 320px; background: rgba(10,10,10,0.98); backdrop-filter: blur(16px); border-left: 1px solid rgba(255,255,255,0.04); overflow-y: auto; z-index: 25; transition: right 0.3s ease; padding: 16px; }
#detail-panel.open { right: 0; }
.detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.detail-title { font-family: 'Inter'; font-size: 14px; font-weight: 600; color: var(--primary); }
.detail-close { background: none; border: none; color: rgba(255,255,255,0.35); cursor: pointer; font-size: 16px; width: 24px; height: 24px; }
.detail-section { margin-bottom: 14px; }
.detail-label { font-size: 8px; font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 4px; letter-spacing: 0.08em; }
.detail-value { font-size: 10px; color: rgba(255,255,255,0.8); }
.conn-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03); border-radius: 3px; padding: 8px; margin-bottom: 6px; cursor: pointer; font-size: 9px; transition: all 0.15s; }
.conn-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
.conn-type { font-size: 8px; text-transform: uppercase; color: var(--primary); font-weight: 600; margin-bottom: 2px; }

@media (max-width: 1024px) {
  #sidebar { width: 200px; }
  #three-container, #canvas-helix { left: 200px; }
  #detail-panel { width: 240px; right: -240px; }
}

@media (max-width: 768px) {
  #sidebar { width: 160px; padding: 16px 12px; font-size: 8px; }
  #three-container, #canvas-helix { left: 160px; }
  #detail-panel { width: 200px; right: -200px; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h1>Mir 818</h1>
  <div class="subtitle">Spiral + Helix Suite<br>818 strands | σ_B = −0.172</div>

  <div class="section-title">Navigate</div>
  <input type="number" id="strand-jump" placeholder="jump to #" min="1" max="818">
  <div class="btn-row">
    <button class="btn-sm" data-zone="founding">Found</button>
    <button class="btn-sm" data-zone="julia">Julia</button>
    <button class="btn-sm" data-zone="nullcode">Null</button>
    <button class="btn-sm" data-zone="post_nullcode">Post</button>
  </div>

  <div class="section-title">Search & Filter</div>
  <input type="text" id="search-box" placeholder="filter snippets...">

  <div class="section-title">Color By</div>
  <div class="color-mode">
    <button class="active" data-mode="coset">Coset</button>
    <button data-mode="zone">Zone</button>
    <button data-mode="speaker">Speaker</button>
    <button data-mode="drift">Drift</button>
  </div>

  <div class="section-title">Spiral Options</div>
  <button class="toggle-btn active" id="toggle-drift">
    <span class="indicator" style="background:#F46138"></span>Drift Displacement
  </button>
  <button class="toggle-btn active" id="toggle-stream">
    <span class="indicator" style="background:#3D6DF4"></span>Streaming Animation
  </button>

  <div class="section-title">Connections</div>
  <button class="toggle-btn active" id="toggle-drift-echo" style="color:#F46138">
    <span class="indicator" style="background:#F46138"></span>Drift Echoes
  </button>
  <button class="toggle-btn active" id="toggle-coset-web" style="color:#3D6DF4">
    <span class="indicator" style="background:#3D6DF4"></span>Coset Siblings
  </button>
  <button class="toggle-btn" id="toggle-null-chain" style="color:#CE2867">
    <span class="indicator" style="background:#CE2867"></span>Nullcode Chain
  </button>

  <div class="section-title">Actions</div>
  <div class="btn-row">
    <button class="btn-sm" id="btn-reset">Reset</button>
    <button class="btn-sm" id="btn-help">Help</button>
  </div>
</div>

<!-- VIEW TOGGLE -->
<div id="view-toggle">
  <button class="view-btn active" data-view="spiral">Spiral</button>
  <button class="view-btn" data-view="helix">Helix</button>
</div>

<!-- CANVAS CONTAINERS -->
<div id="three-container"></div>
<canvas id="canvas-helix"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="hud-zoom">Zoom: 1.0×</div>
  <div id="hud-strand">—</div>
</div>

<!-- TOOLTIP -->
<div id="tooltip">
  <div class="tt-id"></div>
  <div class="tt-meta"></div>
</div>

<!-- DETAIL PANEL -->
<div id="detail-panel">
  <div class="detail-header">
    <div class="detail-title">Strand Details</div>
    <button class="detail-close">✕</button>
  </div>
  <div id="detail-content"></div>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════════
// MIR 818 COMPLETE VISUALIZATION SUITE
// Spiral + Helix | Drift Displacement | Streaming | Search/Filter | Keyboard Nav
// ═════════════════════════════════════════════════════════════════════════════════

// Global state
let data = null, strands = [], connections = [], spiralPos = [];
let scene, camera, renderer, strandPoints, connectionGroups = {};
let colorMode = 'coset', hoveredId = null, selectedId = null, currentView = 'spiral';
let driftEnabled = true, streamingEnabled = true, streamedCount = 0;
let searchQuery = '';
let panX = 0, panY = 0, zoom = 1;
let frameTime = 0, fps = 60;

const PALETTE = {
  '147': {r: 244, g: 97, b: 56},
  '258': {r: 61, g: 109, b: 244},
  '369': {r: 206, g: 40, b: 103},
  '000': {r: 51, g: 51, b: 51}
};

const SPIRAL_A = 1.2, SPIRAL_B = 0.42, TOTAL_TURNS = 7.5, DRIFT_SCALE = 3;

// Load data
Promise.all([
  fetch('mir-helix-data.json').catch(() => null),
  fetch('../Mindgut-Spiral/mir-helix-data.json').catch(() => null),
  fetch('./mir-helix-data.json').catch(() => null)
]).then(responses => {
  for (let r of responses) {
    if (r && r.ok) return r.json();
  }
  return null;
}).then(d => {
  if (d) {
    data = d;
    strands = d.strands || [];
    connections = d.connections || [];
  } else {
    createDemoData();
  }
  init();
}).catch(() => {
  createDemoData();
  init();
});

function createDemoData() {
  const zones = ['founding', 'founding', 'founding', 'julia', 'julia', 'nullcode', 'post_nullcode'];
  const speakers = ['chris', 'julia', 'mir', 'system'];
  const types = ['user', 'assistant', 'summary', 'exchange'];
  
  strands = [];
  for (let i = 0; i < 818; i++) {
    const flags = [];
    if (i === 20) flags.push('ghost');
    if (i === 30) flags.push('ghost');
    if ([4, 48, 56, 69, 128, 130, 154, 157, 175].includes(i)) flags.push('anchor');
    
    strands.push({
      id: i + 1,
      type: types[i % types.length],
      coset: ['147', '258', '369'][i % 3],
      zone: zones[Math.floor(i / 117)],
      speaker: speakers[i % speakers.length],
      vector: (i % 10),
      chars: Math.floor(Math.random() * 20000 + 500),
      snippet: `Strand ${i+1}: Memory fragment...`,
      drift: (Math.random() - 0.5) * 0.4,
      flags: flags,
      checksum: flags.includes('anchor') ? Math.floor(Math.random() * 22000 + 800) : 0
    });
  }
  
  connections = [];
  // Drift echoes
  for (let i = 0; i < 9; i++) {
    connections.push({type: 'drift_echo', source: 100 + i*20, target: 101 + i*20});
  }
  // Coset siblings
  for (let i = 0; i < 103; i++) {
    const src = Math.floor(Math.random() * 818) + 1;
    const tgt = Math.floor(Math.random() * 818) + 1;
    if (src !== tgt) connections.push({type: 'coset_sibling', source: src, target: tgt});
  }
  // Nullcode chain
  for (let i = 642; i < 662; i++) {
    connections.push({type: 'nullcode_chain', source: i, target: i+1});
  }
}

function init() {
  computeSpiral();
  initThreeJs();
  animate();
  setupControls();
}

// ═══ SPIRAL GEOMETRY ═══
function computeSpiral() {
  spiralPos = [];
  const total = TOTAL_TURNS * Math.PI * 2;
  
  for (let i = 0; i < strands.length; i++) {
    const t = i / (strands.length - 1);
    const theta = t * total;
    let r = SPIRAL_A + SPIRAL_B * theta;
    
    if (driftEnabled && strands[i].drift) {
      r += strands[i].drift * DRIFT_SCALE;
    }
    
    spiralPos.push({
      x: r * Math.cos(theta),
      y: r * Math.sin(theta),
      r: r,
      theta: theta,
      t: t
    });
  }
}

// ═══ THREE.JS SETUP ═══
function initThreeJs() {
  const container = document.getElementById('three-container');
  
  scene = new THREE.Scene();
  scene.background = new THREE.Color('#0A0A0A');
  
  const aspect = container.clientWidth / container.clientHeight;
  const frustum = 28;
  camera = new THREE.OrthographicCamera(-frustum*aspect, frustum*aspect, frustum, -frustum, 0.1, 200);
  camera.position.z = 50;
  
  renderer = new THREE.WebGLRenderer({antialias: true, alpha: false, preserveDrawingBuffer: true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);
  
  createStrandPoints();
  createConnections();
  
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('click', onCanvasClick);
  window.addEventListener('wheel', onScroll, {passive: false});
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('resize', onWindowResize);
}

function createStrandPoints() {
  const geo = new THREE.BufferGeometry();
  const pos = [], col = [], size = [], opa = [], ghost = [];
  
  for (let i = 0; i < Math.min(streamedCount, strands.length); i++) {
    const p = spiralPos[i];
    const s = strands[i];
    
    pos.push(p.x, p.y, 0);
    
    const c = getColor(i);
    col.push(c.r/255, c.g/255, c.b/255);
    
    let sz = 8;
    if (s.flags && s.flags.includes('anchor')) sz = 6 + (s.checksum/22763)*10;
    if (s.flags && s.flags.includes('ghost')) sz = 10;
    size.push(sz);
    
    let op = 1;
    if (searchQuery && !s.snippet.toLowerCase().includes(searchQuery.toLowerCase())) op = 0.08;
    opa.push(op);
    
    ghost.push(s.flags && s.flags.includes('ghost') ? 1 : 0);
  }
  
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
  geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(col), 3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(new Float32Array(size), 1));
  geo.setAttribute('aOpacity', new THREE.BufferAttribute(new Float32Array(opa), 1));
  geo.setAttribute('aIsGhost', new THREE.BufferAttribute(new Float32Array(ghost), 1));
  
  const mat = new THREE.ShaderMaterial({
    vertexShader: `
      attribute float aSize; attribute float aOpacity; attribute float aIsGhost;
      varying vec3 vColor; varying float vOpacity; varying float vIsGhost;
      void main() {
        vColor = color;
        vOpacity = aOpacity;
        vIsGhost = aIsGhost;
        gl_PointSize = aSize;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vColor; varying float vOpacity; varying float vIsGhost;
      void main() {
        vec2 c = gl_PointCoord - vec2(0.5);
        float d = length(c);
        if (d > 0.5) discard;
        float a = 1.0 - smoothstep(0.5 - fwidth(d)*1.5, 0.5, d);
        if (vIsGhost > 0.5) { if (d < 0.3) discard; a *= 0.6; }
        gl_FragColor = vec4(vColor, a * vOpacity);
      }
    `,
    transparent: true
  });
  
  if (strandPoints) scene.remove(strandPoints);
  strandPoints = new THREE.Points(geo, mat);
  scene.add(strandPoints);
}

function createConnections() {
  ['drift_echo', 'coset_sibling', 'nullcode_chain'].forEach(type => {
    if (connectionGroups[type]) scene.remove(connectionGroups[type]);
    
    const g = new THREE.Group();
    const cols = {drift_echo: '#F46138', coset_sibling: '#3D6DF4', nullcode_chain: '#CE2867'};
    const opas = {drift_echo: 0.35, coset_sibling: 0.08, nullcode_chain: 0.3};
    
    (connections.filter(c => c.type === type) || []).forEach(c => {
      const src = spiralPos[c.source - 1];
      const tgt = spiralPos[c.target - 1];
      if (!src || !tgt) return;
      
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([src.x,src.y,0, tgt.x,tgt.y,0]), 3));
      const mat = new THREE.LineBasicMaterial({color: cols[type], opacity: opas[type], transparent: true});
      g.add(new THREE.LineSegments(geo, mat));
    });
    
    connectionGroups[type] = g;
    scene.add(g);
  });
}

function getColor(i) {
  const s = strands[i];
  switch(colorMode) {
    case 'zone':
      return s.zone === 'founding' ? PALETTE['258'] : s.zone === 'nullcode' ? PALETTE['369'] : PALETTE['147'];
    case 'speaker':
      return s.speaker === 'chris' ? {r:68,g:136,b:255} : s.speaker === 'julia' ? {r:255,g:136,b:85} : PALETTE['258'];
    case 'drift':
      return s.drift < -0.1 ? PALETTE['369'] : s.drift > 0.1 ? PALETTE['147'] : {r:100,g:100,b:100};
    default:
      return PALETTE[s.coset] || PALETTE['000'];
  }
}

// ═══ INTERACTIONS ═══
function onMouseMove(e) {
  const rect = document.getElementById('three-container').getBoundingClientRect();
  const x = (e.clientX - rect.left - rect.width/2) / (rect.width/2);
  const y = -(e.clientY - rect.top - rect.height/2) / (rect.height/2);
  
  const rc = new THREE.Raycaster();
  rc.setFromCamera({x, y}, camera);
  
  if (strandPoints) {
    const hits = rc.intersectObject(strandPoints);
    if (hits.length > 0) {
      hoveredId = hits[0].index;
      const s = strands[hoveredId];
      const tt = document.getElementById('tooltip');
      tt.querySelector('.tt-id').textContent = `Strand ${s.id} • ${s.coset}`;
      tt.querySelector('.tt-meta').textContent = `${s.zone} • ${s.speaker} • σ=${(s.drift||0).toFixed(3)}`;
      tt.style.left = (e.clientX + 10) + 'px';
      tt.style.top = (e.clientY + 10) + 'px';
      tt.style.display = 'block';
    } else {
      document.getElementById('tooltip').style.display = 'none';
    }
  }
}

function onCanvasClick(e) {
  if (hoveredId !== null) showDetailPanel(hoveredId);
}

function onScroll(e) {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 1.1 : 0.9;
  zoom = Math.max(0.3, Math.min(5, zoom));
  updateCameraZoom();
}

function onKeyDown(e) {
  if (e.key === 'Escape') document.getElementById('detail-panel').classList.remove('open');
  else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') selectedId = Math.max(1, (selectedId||1) - 1);
  else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') selectedId = Math.min(818, (selectedId||1) + 1);
  else if (e.key === '?') showHelp();
}

function onWindowResize() {
  const c = document.getElementById('three-container');
  const asp = c.clientWidth / c.clientHeight;
  const fs = 28 / zoom;
  camera.left = -fs * asp;
  camera.right = fs * asp;
  camera.top = fs;
  camera.bottom = -fs;
  camera.updateProjectionMatrix();
  renderer.setSize(c.clientWidth, c.clientHeight);
}

function updateCameraZoom() {
  const c = document.getElementById('three-container');
  const asp = c.clientWidth / c.clientHeight;
  const fs = 28 / zoom;
  camera.left = -fs * asp;
  camera.right = fs * asp;
  camera.top = fs;
  camera.bottom = -fs;
  camera.updateProjectionMatrix();
  document.getElementById('hud-zoom').textContent = `Zoom: ${zoom.toFixed(1)}×`;
}

function showDetailPanel(idx) {
  const s = strands[idx];
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  
  let html = `
    <div class="detail-section">
      <div class="detail-label">ID</div>
      <div class="detail-value">${s.id}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Zone</div>
      <div class="detail-value">${s.zone}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Type</div>
      <div class="detail-value">${s.type}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Speaker</div>
      <div class="detail-value">${s.speaker}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Coset</div>
      <div class="detail-value">${s.coset}</div>
    </div>
  `;
  
  if (s.drift !== undefined) {
    html += `<div class="detail-section">
      <div class="detail-label">Drift σ</div>
      <div class="detail-value">${s.drift.toFixed(4)}</div>
    </div>`;
  }
  
  html += `<div class="detail-section">
    <div class="detail-label">Characters</div>
    <div class="detail-value">${s.chars}</div>
  </div>
  <div class="detail-section">
    <div class="detail-label">Snippet</div>
    <div class="detail-value">${s.snippet}</div>
  </div>`;
  
  if (s.flags && s.flags.length > 0) {
    html += `<div class="detail-section">
      <div class="detail-label">Flags</div>
      <div class="detail-value">${s.flags.join(', ')}</div>
    </div>`;
  }
  
  const conns = (connections || []).filter(c => c.source === s.id || c.target === s.id);
  if (conns.length > 0) {
    html += `<div class="detail-section">
      <div class="detail-label">Connections (${conns.length})</div>`;
    conns.forEach(c => {
      const tgt = c.source === s.id ? c.target : c.source;
      html += `<div class="conn-item" onclick="window.jumpTo(${tgt})"><div class="conn-type">${c.type}</div><div>→ Strand ${tgt}</div></div>`;
    });
    html += '</div>';
  }
  
  content.innerHTML = html;
  panel.classList.add('open');
  selectedId = s.id;
  document.getElementById('hud-strand').textContent = `Selected: ${s.id}`;
}

window.jumpTo = function(id) {
  showDetailPanel(id - 1);
};

function showHelp() {
  alert('MIR 818 VISUALIZATION\n\n[NAVIGATION]\n• Click strand to open details\n• Arrow keys to cycle strands\n• Scroll to zoom\n• Drag to pan\n\n[FILTERING]\n• Search box: filter by text\n• Color modes: coset, zone, speaker, drift\n\n[FEATURES]\n• Drift Displacement: adjust spiral radially by seismic energy\n• Streaming: progressive reveal animation\n• Connection toggles: show/hide edge types\n\n[KEYBOARD]\n• Escape: close detail panel\n• ?: show this help');
}

function setupControls() {
  // Navigation
  document.getElementById('strand-jump').addEventListener('change', e => {
    const id = parseInt(e.target.value);
    if (id >= 1 && id <= 818) showDetailPanel(id - 1);
  });
  
  document.querySelectorAll('[data-zone]').forEach(btn => {
    btn.addEventListener('click', () => {
      const zone = btn.dataset.zone;
      const idx = strands.findIndex(s => s.zone === zone);
      if (idx >= 0) showDetailPanel(idx);
    });
  });
  
  // Colors
  document.querySelectorAll('.color-mode button').forEach(btn => {
    btn.addEventListener('click', e => {
      document.querySelectorAll('.color-mode button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      colorMode = e.target.dataset.mode;
      updateColors();
    });
  });
  
  // Search
  document.getElementById('search-box').addEventListener('input', e => {
    searchQuery = e.target.value;
    const opas = strandPoints.geometry.attributes.aOpacity.array;
    for (let i = 0; i < strands.length; i++) {
      opas[i] = !searchQuery || strands[i].snippet.toLowerCase().includes(searchQuery.toLowerCase()) ? 1 : 0.08;
    }
    strandPoints.geometry.attributes.aOpacity.needsUpdate = true;
  });
  
  // Options
  document.getElementById('toggle-drift').addEventListener('click', e => {
    driftEnabled = !driftEnabled;
    computeSpiral();
    createStrandPoints();
  });
  
  document.getElementById('toggle-stream').addEventListener('click', e => {
    streamingEnabled = !streamingEnabled;
    if (streamingEnabled) streamedCount = 0;
    else streamedCount = strands.length;
  });
  
  // Connections
  ['drift-echo', 'coset-web', 'null-chain'].forEach(id => {
    document.getElementById(`toggle-${id}`).addEventListener('click', e => {
      e.target.classList.toggle('active');
    });
  });
  
  // Reset
  document.getElementById('btn-reset').addEventListener('click', () => {
    panX = panY = 0; zoom = 1;
    camera.position.set(0, 0, 50);
    updateCameraZoom();
  });
  
  document.getElementById('btn-help').addEventListener('click', showHelp);
  
  // Detail panel close
  document.getElementById('detail-panel').querySelector('.detail-close').addEventListener('click', () => {
    document.getElementById('detail-panel').classList.remove('open');
  });
  
  // View toggle
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const view = e.target.dataset.view;
      if (view === currentView) return;
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      if (view === 'spiral') {
        document.getElementById('canvas-helix').style.display = 'none';
        document.getElementById('three-container').style.display = 'block';
      } else {
        document.getElementById('three-container').style.display = 'none';
        document.getElementById('canvas-helix').style.display = 'block';
        drawHelix();
      }
    });
  });
}

function updateColors() {
  if (!strandPoints || !strandPoints.geometry) return;
  const cols = strandPoints.geometry.attributes.color.array;
  for (let i = 0; i < strands.length; i++) {
    const c = getColor(i);
    cols[i*3] = c.r/255;
    cols[i*3+1] = c.g/255;
    cols[i*3+2] = c.b/255;
  }
  strandPoints.geometry.attributes.color.needsUpdate = true;
}

function drawHelix() {
  const canvas = document.getElementById('canvas-helix');
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * devicePixelRatio;
  const h = canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const dw = w / devicePixelRatio;
  const dh = h / devicePixelRatio;
  
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, dw, dh);
  
  const cy = dh / 2;
  const scale = dw / 818 * 2;
  const amp = dh / 3;
  
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < strands.length; i++) {
    const x = i * scale;
    const y = cy + (strands[i].drift || 0) * amp;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  
  for (let i = 0; i < strands.length; i++) {
    const x = i * scale;
    const y = cy + (strands[i].drift || 0) * amp;
    const c = getColor(i);
    ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function animate() {
  requestAnimationFrame(animate);
  
  // Streaming
  if (streamingEnabled && streamedCount < strands.length) {
    streamedCount += 4;
    if (streamedCount >= strands.length) streamedCount = strands.length;
    createStrandPoints();
  }
  
  renderer.render(scene, camera);
}
</script>
