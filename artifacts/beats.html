<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beats</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lekton:wght@400;700&family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0A0A0A;overflow:hidden;font-family:'Lekton',monospace;cursor:crosshair;}
  canvas{display:block;position:fixed;top:0;left:0;}
  #hud{position:fixed;top:14px;left:18px;z-index:10;pointer-events:none;}
  #hud h1{font-size:10px;font-weight:700;color:#CE2867;letter-spacing:0.12em;text-transform:uppercase;opacity:0.7;}
  #hud p{font-size:8px;color:#ffffff10;letter-spacing:0.08em;text-transform:uppercase;}
  #tooltip{position:fixed;z-index:20;pointer-events:none;font-family:'Space Mono',monospace;font-size:10px;
    color:#aaa;background:#1a1a1a;border:1px solid #333;padding:3px 7px;border-radius:2px;display:none;white-space:nowrap;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><h1>ø co. / beats</h1><p>step sequencer · 12×8 · 90 bpm</p></div>
<div id="tooltip"></div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const tooltip=document.getElementById('tooltip');
let W,H,t=0,mx=-999,my=-999;

const COLS=12,ROWS=8,CELL=50,GAP=4,BPM=90;
const BEAT_MS=(60/BPM)*1000;
const COLORS=['#CE2867','#F46138','#3D6DF4','#2C9FF4','#8a40b0','#40a080','#228a40'];
const PATTERNS=['dots','vstripes','hstripes','checkers','nested','crosses','diag','solid'];

let gridX,gridY; // top-left of grid in canvas coords
let cells=[]; // flat array [row*COLS+col]
let playheadCol=0, playheadTime=0;
let pulses=[]; // {col,row,startTime}
let signalDots=[]; // {x,y,progress,speed,srcIdx,dstIdx}
let connections=[]; // {src,dst,cpx,cpy}

function rnd(a,b){return a+Math.random()*(b-a);}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b};}

function initGrid(){
  cells=[];
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      cells.push({row:r,col:c,active:false,color:'#333',pattern:'solid',value:0});
    }
  }
  // seed ~27 random active cells
  let count=0,target=27;
  while(count<target){
    const i=Math.floor(Math.random()*cells.length);
    if(!cells[i].active){
      activateCell(cells[i]);
      count++;
    }
  }
  buildConnections();
}

function activateCell(cell){
  cell.active=true;
  cell.color=pick(COLORS);
  cell.pattern=pick(PATTERNS);
  cell.value=Math.round(rnd(0,9.9)*10)/10;
}

function buildConnections(){
  connections=[];
  signalDots=[];
  const actives=cells.filter(c=>c.active);
  for(let i=0;i<actives.length;i++){
    for(let j=i+1;j<actives.length;j++){
      const a=actives[i],b=actives[j];
      const dr=Math.abs(a.row-b.row),dc=Math.abs(a.col-b.col);
      const dist=Math.sqrt(dr*dr+dc*dc);
      if(dist<=3&&Math.random()<0.6){
        const ax=gridX+(a.col)*(CELL+GAP)+CELL/2;
        const ay=gridY+(a.row)*(CELL+GAP)+CELL/2;
        const bx=gridX+(b.col)*(CELL+GAP)+CELL/2;
        const by=gridY+(b.row)*(CELL+GAP)+CELL/2;
        const mx2=(ax+bx)/2+rnd(-30,30);
        const my2=(ay+by)/2+rnd(-30,30);
        const conn={src:cells.indexOf(a),dst:cells.indexOf(b),ax,ay,bx,by,cpx:mx2,cpy:my2,color:a.color};
        connections.push(conn);
        // create signal dots for this connection
        const numDots=Math.floor(rnd(1,3));
        for(let d=0;d<numDots;d++){
          signalDots.push({connIdx:connections.length-1,progress:Math.random(),speed:rnd(0.15,0.5)});
        }
      }
    }
  }
}

function cellAt(px,py){
  const c=Math.floor((px-gridX)/(CELL+GAP));
  const r=Math.floor((py-gridY)/(CELL+GAP));
  if(c<0||c>=COLS||r<0||r>=ROWS)return null;
  const cx=gridX+c*(CELL+GAP), cy=gridY+r*(CELL+GAP);
  if(px>=cx&&px<cx+CELL&&py>=cy&&py<cy+CELL) return cells[r*COLS+c];
  return null;
}

function resize(){
  W=C.width=innerWidth;H=C.height=innerHeight;
  gridX=Math.floor((W-COLS*(CELL+GAP)+GAP)/2);
  gridY=Math.floor((H-ROWS*(CELL+GAP)+GAP)/2);
  if(connections.length) buildConnections();
}
addEventListener('resize',resize);

// --- Drawing helpers ---

function drawPattern(x,y,w,h,pattern,color){
  const rgb=hexToRgb(color);
  X.save();
  X.beginPath();X.rect(x,y,w,h);X.clip();
  switch(pattern){
    case 'solid':
      X.fillStyle=color;X.fillRect(x,y,w,h);break;
    case 'dots':
      X.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`;X.fillRect(x,y,w,h);
      X.fillStyle=color;
      for(let dy=4;dy<h;dy+=8)for(let dx=4;dx<w;dx+=8){X.beginPath();X.arc(x+dx,y+dy,1.5,0,Math.PI*2);X.fill();}
      break;
    case 'vstripes':
      X.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.12)`;X.fillRect(x,y,w,h);
      X.strokeStyle=color;X.lineWidth=1.5;
      for(let dx=4;dx<w;dx+=7){X.beginPath();X.moveTo(x+dx,y);X.lineTo(x+dx,y+h);X.stroke();}
      break;
    case 'hstripes':
      X.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.12)`;X.fillRect(x,y,w,h);
      X.strokeStyle=color;X.lineWidth=1.5;
      for(let dy=4;dy<h;dy+=7){X.beginPath();X.moveTo(x,y+dy);X.lineTo(x+w,y+dy);X.stroke();}
      break;
    case 'checkers':
      const s=8;
      for(let cy2=0;cy2<h;cy2+=s)for(let cx2=0;cx2<w;cx2+=s){
        if(((cx2/s|0)+(cy2/s|0))%2===0){X.fillStyle=color;X.fillRect(x+cx2,y+cy2,s,s);}
        else{X.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.1)`;X.fillRect(x+cx2,y+cy2,s,s);}
      }
      break;
    case 'nested':
      X.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.1)`;X.fillRect(x,y,w,h);
      X.strokeStyle=color;X.lineWidth=1;
      for(let i=3;i<w/2;i+=6){X.strokeRect(x+i,y+i,w-i*2,h-i*2);}
      break;
    case 'crosses':
      X.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.12)`;X.fillRect(x,y,w,h);
      X.strokeStyle=color;X.lineWidth=1;
      for(let dy=6;dy<h;dy+=12)for(let dx=6;dx<w;dx+=12){
        X.beginPath();X.moveTo(x+dx-3,y+dy);X.lineTo(x+dx+3,y+dy);X.stroke();
        X.beginPath();X.moveTo(x+dx,y+dy-3);X.lineTo(x+dx,y+dy+3);X.stroke();
      }
      break;
    case 'diag':
      X.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.12)`;X.fillRect(x,y,w,h);
      X.strokeStyle=color;X.lineWidth=1;
      for(let i=-h;i<w+h;i+=7){X.beginPath();X.moveTo(x+i,y);X.lineTo(x+i+h,y+h);X.stroke();}
      break;
  }
  X.restore();
}

function drawCrosshair(cx,cy,size){
  X.strokeStyle='#333';X.lineWidth=1;
  X.beginPath();X.moveTo(cx-size,cy);X.lineTo(cx+size,cy);X.stroke();
  X.beginPath();X.moveTo(cx,cy-size);X.lineTo(cx,cy+size);X.stroke();
}

function drawResistorWiggle(x,y,w){
  X.strokeStyle='#1a1a1a';X.lineWidth=1;
  X.beginPath();X.moveTo(x,y);
  const segs=12,sw=w/segs,amp=5;
  for(let i=0;i<segs;i++){
    const nx=x+(i+1)*sw;
    const ny=y+(i%2===0?-amp:amp);
    X.lineTo(nx,ny);
  }
  X.lineTo(x+w,y);
  X.stroke();
}

// --- Main draw ---

function draw(now){
  requestAnimationFrame(draw);
  const dt=t?now-t:16;t=now;

  // advance playhead
  playheadTime+=dt;
  if(playheadTime>=BEAT_MS){
    playheadTime-=BEAT_MS;
    playheadCol=(playheadCol+1)%COLS;
    // trigger pulses for active cells in this column
    for(let r=0;r<ROWS;r++){
      const cell=cells[r*COLS+playheadCol];
      if(cell.active) pulses.push({row:r,col:playheadCol,start:now});
    }
  }

  X.clearRect(0,0,W,H);

  // --- Signal flow lines ---
  for(const conn of connections){
    const rgb=hexToRgb(conn.color);
    X.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.12)`;
    X.lineWidth=1;
    X.beginPath();
    X.moveTo(conn.ax,conn.ay);
    X.quadraticCurveTo(conn.cpx,conn.cpy,conn.bx,conn.by);
    X.stroke();
  }

  // signal dots traveling along curves
  for(const dot of signalDots){
    dot.progress+=dot.speed*dt/1000;
    if(dot.progress>1)dot.progress-=1;
    const conn=connections[dot.connIdx];
    if(!conn)continue;
    const t2=dot.progress;
    const it=1-t2;
    const px=it*it*conn.ax+2*it*t2*conn.cpx+t2*t2*conn.bx;
    const py=it*it*conn.ay+2*it*t2*conn.cpy+t2*t2*conn.by;
    const rgb=hexToRgb(conn.color);
    X.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.6)`;
    X.beginPath();X.arc(px,py,2,0,Math.PI*2);X.fill();
  }

  // --- Column labels ---
  X.font='9px "Space Mono", monospace';X.textAlign='center';X.textBaseline='bottom';
  for(let c=0;c<COLS;c++){
    const cx=gridX+c*(CELL+GAP)+CELL/2;
    X.fillStyle='#333';
    X.fillText(String(c+1).padStart(2,'0'),cx,gridY-18);
  }

  // --- Beat group brackets ---
  const groups=[{start:0,end:3,label:'A'},{start:4,end:7,label:'B'},{start:8,end:11,label:'C'}];
  X.strokeStyle='#222';X.lineWidth=1;X.textAlign='center';X.textBaseline='bottom';
  for(const g of groups){
    const lx=gridX+g.start*(CELL+GAP);
    const rx=gridX+g.end*(CELL+GAP)+CELL;
    const by=gridY-28;
    X.beginPath();X.moveTo(lx,by+6);X.lineTo(lx,by);X.lineTo(rx,by);X.lineTo(rx,by+6);X.stroke();
    X.fillStyle='#2a2a2a';
    X.font='8px "Space Mono", monospace';
    X.fillText(g.label,(lx+rx)/2,by-2);
  }

  // --- Row labels ---
  X.font='9px "Space Mono", monospace';X.textAlign='right';X.textBaseline='middle';
  X.fillStyle='#333';
  for(let r=0;r<ROWS;r++){
    const cy=gridY+r*(CELL+GAP)+CELL/2;
    X.fillText('R'+r,gridX-12,cy);
  }

  // --- Playhead vertical line ---
  const phx=gridX+playheadCol*(CELL+GAP)+CELL/2;
  X.strokeStyle='rgba(255,255,255,0.06)';X.lineWidth=1;
  X.beginPath();X.moveTo(phx,gridY-40);X.lineTo(phx,gridY+ROWS*(CELL+GAP)+20);X.stroke();

  // playhead column highlight
  const phCellX=gridX+playheadCol*(CELL+GAP);
  X.fillStyle='rgba(255,255,255,0.03)';
  X.fillRect(phCellX-1,gridY-2,CELL+2,ROWS*(CELL+GAP)-GAP+4);

  // --- Cells ---
  let activeCount=0;
  const hoverCell=cellAt(mx,my);

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=cells[r*COLS+c];
      const cx=gridX+c*(CELL+GAP);
      const cy=gridY+r*(CELL+GAP);

      if(cell.active){
        activeCount++;
        // check pulse
        let scale=1,brightness=0;
        for(const p of pulses){
          if(p.row===r&&p.col===c){
            const age=(now-p.start)/300;
            if(age<1){scale=1+0.12*(1-age);brightness=1-age;}
          }
        }

        X.save();
        if(scale!==1){
          const centerX=cx+CELL/2,centerY=cy+CELL/2;
          X.translate(centerX,centerY);X.scale(scale,scale);X.translate(-centerX,-centerY);
        }

        drawPattern(cx,cy,CELL,CELL,cell.pattern,cell.color);

        // brightness flash overlay
        if(brightness>0){
          X.fillStyle=`rgba(255,255,255,${brightness*0.25})`;
          X.fillRect(cx,cy,CELL,CELL);
        }

        // tiny value text
        X.font='8px "Lekton", monospace';X.textAlign='right';X.textBaseline='bottom';
        X.fillStyle=`rgba(255,255,255,0.5)`;
        X.fillText(cell.value.toFixed(1),cx+CELL-3,cy+CELL-3);

        X.restore();
      } else {
        // inactive cell
        X.strokeStyle='#222';X.lineWidth=1;
        X.strokeRect(cx+0.5,cy+0.5,CELL-1,CELL-1);
      }
    }
  }

  // clean old pulses
  for(let i=pulses.length-1;i>=0;i--){if(now-pulses[i].start>300)pulses.splice(i,1);}

  // --- Corner crosshairs ---
  const gw=COLS*(CELL+GAP)-GAP, gh=ROWS*(CELL+GAP)-GAP;
  drawCrosshair(gridX-8,gridY-8,5);
  drawCrosshair(gridX+gw+8,gridY-8,5);
  drawCrosshair(gridX-8,gridY+gh+8,5);
  drawCrosshair(gridX+gw+8,gridY+gh+8,5);

  // --- Resistor wiggles along bottom ---
  const wiggleY=gridY+gh+35;
  for(let i=0;i<4;i++){
    drawResistorWiggle(gridX+i*(gw/4)+10,wiggleY,gw/4-30);
  }

  // --- Top-right HUD ---
  X.font='10px "Lekton", monospace';X.textAlign='right';X.textBaseline='top';
  X.fillStyle='#444';
  X.fillText('BPM: 90',W-20,18);
  X.fillText('ACTIVE: '+activeCount,W-20,32);

  // --- Bottom-left branding ---
  X.font='8px "Lekton", monospace';X.textAlign='left';X.textBaseline='bottom';
  X.fillStyle='#1a1a1a';
  X.fillText('ø co. / beats',20,H-16);

  // --- Tooltip ---
  if(hoverCell){
    tooltip.style.display='block';
    tooltip.style.left=(mx+14)+'px';
    tooltip.style.top=(my-10)+'px';
    tooltip.textContent=`R${hoverCell.row} C${hoverCell.col+1} = ${hoverCell.active?hoverCell.value.toFixed(1):'--'}`;
  } else {
    tooltip.style.display='none';
  }
}

// --- Events ---
C.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
C.addEventListener('mouseleave',()=>{mx=-999;my=-999;});

C.addEventListener('click',e=>{
  const cell=cellAt(e.clientX,e.clientY);
  if(!cell)return;
  if(cell.active){
    cell.active=false;
  } else {
    activateCell(cell);
  }
  buildConnections();
});

// --- Init ---
resize();
initGrid();
buildConnections();
requestAnimationFrame(draw);
</script>
</body>
</html>
