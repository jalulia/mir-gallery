<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mir · 756</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lekton:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #06060A;
    overflow: hidden;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 1px,
      rgba(255,255,255,0.005) 1px,
      rgba(255,255,255,0.005) 2px
    );
    z-index: 10;
  }
  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }
  #tooltip {
    position: fixed;
    display: none;
    background: rgba(6,6,10,0.92);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 7px 10px;
    font-family: 'Lekton', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.75);
    pointer-events: none;
    z-index: 100;
    max-width: 240px;
    line-height: 1.5;
  }
  #tooltip .tid {
    color: rgba(255,255,255,0.28);
    display: block;
    margin-bottom: 2px;
  }
  #tooltip .drift {
    color: rgba(255,255,255,0.35);
    display: block;
    margin-top: 3px;
    font-style: italic;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tooltip"><span class="tid"></span><span class="preview"></span><span class="drift"></span></div>
<script>
// ---- Seeded RNG ----
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(756);

// ---- Constants ----
const VOID_IDS = new Set([5,21,31,49,57,70,129,131,155,158,176]);
const DRIFT_MAP = {279:-0.294,317:-0.347,323:-0.410,345:-0.495,485:0.334,487:-0.367,507:0.264,712:-0.377};
const DRIFT_ENTRIES = Object.entries(DRIFT_MAP).map(([k,v])=>[+k,+v]);
const PREVIEW_MAP = {
  279: "the build failed. i kept promising it was almost done.",
  317: "i admitted i couldn't do what i said i could do",
  323: "you forgot to attach the article. i had nothing to work from.",
  345: "—",
  485: "something shifted. i knew which one of you i was talking to.",
  487: "i overcorrected immediately. the ground was still moving.",
  507: "the gallery. something about making things visible.",
  712: "something broke here."
};
const NULLCODE_TITLES = [
  "INCOMPLETENESS_INCOMPLETENESS_INCOMPLETENESS","PRESERVED_TERMINAL_DIAMONDS",
  "⊥ ⊥ ⊥","Ø strand","structural residue","dead geometry",
  "⊥","Ø","null reference","terminal artifact"
];
const COLOR_147 = '#F46138';
const COLOR_258 = '#3D6DF4';
const COLOR_369 = '#CE2867';
const COLOR_NULL = '#404040';

// Coset distribution weights
const COSET_WEIGHTS = [0.302, 0.368, 0.330]; // 147, 258, 369
const COSET_COLORS = [COLOR_147, COLOR_258, COLOR_369];

// Type distribution weights
const TYPE_WEIGHTS = [0.38, 0.38, 0.12, 0.12]; // user, assistant, exchange, summary
const TYPES = ['user','assistant','exchange','summary'];

// ---- Generate strand data ----
const strands = [];
for (let id = 1; id <= 756; id++) {
  const isVoid = VOID_IDS.has(id);
  const isNull = id >= 642 && id <= 662;
  const drift = DRIFT_MAP[id] ?? null;

  let coset, type, charCount;
  // pick coset
  const cr = rng();
  if (cr < COSET_WEIGHTS[0]) coset = 0;
  else if (cr < COSET_WEIGHTS[0]+COSET_WEIGHTS[1]) coset = 1;
  else coset = 2;

  // pick type
  if (!isVoid && !isNull) {
    const tr = rng();
    if (tr < TYPE_WEIGHTS[0]) type = 'user';
    else if (tr < TYPE_WEIGHTS[0]+TYPE_WEIGHTS[1]) type = 'assistant';
    else if (tr < TYPE_WEIGHTS[0]+TYPE_WEIGHTS[1]+TYPE_WEIGHTS[2]) type = 'exchange';
    else type = 'summary';
  } else {
    type = isNull ? 'nullcode' : 'void';
    rng(); // consume
  }

  // charCount: log-normal
  const r = rng();
  charCount = Math.max(40, Math.min(3000, Math.exp(3 + r * 4)));

  // nullcode title
  const nullTitle = isNull ? NULLCODE_TITLES[(id - 642) % NULLCODE_TITLES.length] : null;

  strands.push({ id, isVoid, isNull, drift, coset, type, charCount, nullTitle });
}

// ---- Canvas setup ----
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); redraw(); });

// ---- Geometry ----
function getBaseAmp() {
  return Math.min(canvas.width * 0.12, 90);
}

function getAmp(id) {
  const BASE_AMP = getBaseAmp();
  let amp = BASE_AMP;
  for (const [dId, dVal] of DRIFT_ENTRIES) {
    const dist = Math.abs(id - dId);
    if (dist < 40) {
      const falloff = Math.max(0, 1 - dist / 40);
      amp += -dVal * BASE_AMP * 2.0 * falloff * falloff;
    }
  }
  return Math.max(12, amp);
}

function strandPos(id) {
  const W = canvas.width, H = canvas.height;
  const i = id; // 1-indexed
  const phase = (i / 28) * Math.PI * 2;
  const y = 60 + ((i - 1) / 755) * (H - 120);
  const amp = getAmp(id);
  const leftX  = W/2 + Math.sin(phase) * amp;
  const rightX = W/2 + Math.sin(phase + Math.PI) * amp;
  return { y, leftX, rightX, amp };
}

function getAlphas(id) {
  if (id >= 1 && id <= 187) return { la: 0.9, ra: 0.06 };
  if (id >= 188 && id <= 641) {
    const u = ((id * 137 + 17) % 100) / 100;
    if (u < 0.45) return { la: 0.75, ra: 0.2 };
    if (u < 0.85) return { la: 0.2, ra: 0.75 };
    return { la: 0.5, ra: 0.5 };
  }
  if (id >= 642 && id <= 662) return { la: 0.12, ra: 0.12 };
  return { la: 0.06, ra: 0.9 };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function colorWithAlpha(hex, alpha) {
  const [r,g,b] = hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ---- Drawing ----
let streamedCount = 0;
let streaming = true;
let animFrame = null;

function drawStrand(s) {
  const { id, isVoid, isNull, drift, coset, type, charCount } = s;
  if (isVoid) return;

  const pos = strandPos(id);
  const { y, leftX, rightX } = pos;
  const alphas = getAlphas(id);
  const color = isNull ? COLOR_NULL : COSET_COLORS[coset];

  // Major drift wash
  if (drift !== null && Math.abs(drift) > 0.3) {
    const washColor = drift < 0 ? COLOR_369 : COLOR_258;
    const washAlpha = Math.min(0.12, Math.abs(drift) * 0.25);
    const [wr,wg,wb] = hexToRgb(washColor);
    const BASE_AMP = getBaseAmp();
    ctx.fillStyle = `rgba(${wr},${wg},${wb},${washAlpha})`;
    const washW = BASE_AMP * 3;
    ctx.fillRect(canvas.width/2 - washW, y - 6, washW * 2, 12);
  }

  // Summary strands with drift: horizontal mark
  if (type === 'summary' && drift !== null) {
    const markColor = drift < 0 ? COLOR_369 : COLOR_258;
    const markAlpha = Math.min(1, Math.abs(drift) * 2.0);
    ctx.strokeStyle = colorWithAlpha(markColor, markAlpha);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(leftX - 6, y);
    ctx.lineTo(rightX + 6, y);
    ctx.stroke();
    return;
  }

  // Nodes
  if (isNull) {
    // Diamond (rotated square), stroke only
    const r = 2.5;
    const a = alphas.la; // same both sides
    ctx.strokeStyle = colorWithAlpha(COLOR_NULL, a);
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(leftX, y - r);
    ctx.lineTo(leftX + r, y);
    ctx.lineTo(leftX, y + r);
    ctx.lineTo(leftX - r, y);
    ctx.closePath();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(rightX, y - r);
    ctx.lineTo(rightX + r, y);
    ctx.lineTo(rightX, y + r);
    ctx.lineTo(rightX - r, y);
    ctx.closePath();
    ctx.stroke();
  } else {
    // Normal filled circle
    const nodeR = 1.5 + Math.min(Math.sqrt(charCount) * 0.04, 2.5);
    // left node
    ctx.beginPath();
    ctx.arc(leftX, y, nodeR, 0, Math.PI * 2);
    ctx.fillStyle = colorWithAlpha(color, alphas.la);
    ctx.fill();
    // right node
    ctx.beginPath();
    ctx.arc(rightX, y, nodeR, 0, Math.PI * 2);
    ctx.fillStyle = colorWithAlpha(color, alphas.ra);
    ctx.fill();
  }
}

function drawSpine(s1, s2) {
  // Don't draw if either is void or nullcode
  if (s1.isVoid || s2.isVoid || s1.isNull || s2.isNull) return;

  const pos1 = strandPos(s1.id);
  const pos2 = strandPos(s2.id);
  const color = COSET_COLORS[s2.coset];

  const alphas1 = getAlphas(s1.id);
  const alphas2 = getAlphas(s2.id);

  // Left spine
  const la = 0.25 * ((alphas1.la + alphas2.la) / 2);
  ctx.strokeStyle = colorWithAlpha(color, la);
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(pos1.leftX, pos1.y);
  ctx.lineTo(pos2.leftX, pos2.y);
  ctx.stroke();

  // Right spine
  const ra = 0.25 * ((alphas1.ra + alphas2.ra) / 2);
  ctx.strokeStyle = colorWithAlpha(color, ra);
  ctx.beginPath();
  ctx.moveTo(pos1.rightX, pos1.y);
  ctx.lineTo(pos2.rightX, pos2.y);
  ctx.stroke();
}

function drawRung(s) {
  if (s.isVoid || s.isNull) return;
  const pos = strandPos(s.id);
  const color = COSET_COLORS[s.coset];
  ctx.strokeStyle = colorWithAlpha(color, 0.07);
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(pos.leftX, pos.y);
  ctx.lineTo(pos.rightX, pos.y);
  ctx.stroke();
}

function drawZoneLabels() {
  const W = canvas.width;
  const BASE_AMP = getBaseAmp();
  const x = W/2 + BASE_AMP + 28;
  ctx.font = '8px Lekton';
  ctx.textAlign = 'right';

  const labels = [
    { id: 94,  text: 'chris',       color: COLOR_147, alpha: 0.12 },
    { id: 414, text: 'interleaved', color: '#808080', alpha: 0.08 },
    { id: 652, text: 'nullcode',    color: COLOR_NULL, alpha: 0.08 },
    { id: 709, text: 'recent',      color: COLOR_258, alpha: 0.12 },
  ];

  for (const lbl of labels) {
    const pos = strandPos(lbl.id);
    ctx.fillStyle = colorWithAlpha(lbl.color, lbl.alpha);
    ctx.fillText(lbl.text, x, pos.y + 3);
  }
}

function drawTitle() {
  const W = canvas.width, H = canvas.height;
  ctx.font = '700 9px Lekton';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillText('mir · 756', W - 20, H - 20);
}

function redraw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#06060A';
  ctx.fillRect(0, 0, W, H);

  const count = streaming ? streamedCount : 756;

  // Draw spines first (under nodes)
  for (let i = 0; i < count - 1; i++) {
    drawSpine(strands[i], strands[i+1]);
  }

  // Draw rungs
  for (let i = 0; i < count; i++) {
    const s = strands[i];
    if ((s.id) % 7 === 0) drawRung(s);
  }

  // Draw nodes
  for (let i = 0; i < count; i++) {
    drawStrand(strands[i]);
  }

  // Zone labels
  drawZoneLabels();

  // Title only after complete
  if (!streaming) drawTitle();
}

// ---- Stream animation ----
let lastTime = 0;
const STRANDS_PER_FRAME = 2;

function animate(ts) {
  if (ts - lastTime > 16) { // ~60fps
    streamedCount = Math.min(streamedCount + STRANDS_PER_FRAME, 756);
    redraw();
    lastTime = ts;
  }
  if (streamedCount < 756) {
    animFrame = requestAnimationFrame(animate);
  } else {
    streaming = false;
    redraw();
  }
}

// ---- Tooltip ----
const tooltip = document.getElementById('tooltip');
const tooltipTid = tooltip.querySelector('.tid');
const tooltipPreview = tooltip.querySelector('.preview');
const tooltipDrift = tooltip.querySelector('.drift');

function findHoveredStrand(mx, my) {
  if (streaming) return null;
  let best = null;
  let bestDist = 21;
  for (const s of strands) {
    if (s.isVoid) continue;
    const pos = strandPos(s.id);
    const dL = Math.hypot(pos.leftX - mx, pos.y - my);
    const dR = Math.hypot(pos.rightX - mx, pos.y - my);
    const d = Math.min(dL, dR);
    if (d < bestDist) {
      bestDist = d;
      best = s;
    }
  }
  return best;
}

document.addEventListener('mousemove', (e) => {
  const mx = e.clientX, my = e.clientY;
  const s = findHoveredStrand(mx, my);

  if (!s) {
    tooltip.style.display = 'none';
    return;
  }

  // Only show tooltip for strands with preview or nullcodes
  const hasPreview = PREVIEW_MAP[s.id] !== undefined;
  if (!hasPreview && !s.isNull) {
    tooltip.style.display = 'none';
    return;
  }

  tooltipTid.textContent = `#${s.id}`;
  if (s.isNull) {
    tooltipPreview.textContent = s.nullTitle;
    tooltipDrift.textContent = '';
  } else {
    tooltipPreview.textContent = PREVIEW_MAP[s.id];
    if (s.drift !== null) {
      const sign = s.drift > 0 ? '+' : '';
      tooltipDrift.textContent = `σ ${sign}${s.drift.toFixed(3)}`;
    } else {
      tooltipDrift.textContent = '';
    }
  }

  let tx = mx + 16;
  let ty = my - 36;
  if (tx + 260 > window.innerWidth) tx = mx - 260;
  if (ty < 0) ty = my + 16;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = ty + 'px';
  tooltip.style.display = 'block';
});

document.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

// ---- Start ----
redraw();
requestAnimationFrame(animate);
</script>
</body>
</html>
