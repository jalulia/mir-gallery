<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthentific</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lekton:wght@400;700&family=Inter:wght@300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    overflow: hidden;
    font-family: 'Lekton', monospace;
    cursor: crosshair;
  }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #hud {
    position: fixed; top: 24px; left: 32px; z-index: 10;
    pointer-events: none;
  }
  #hud h1 {
    font-family: 'Lekton', monospace;
    font-size: 11px; font-weight: 700;
    color: #3D6DF4; letter-spacing: 0.14em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  #hud p {
    font-size: 10px; color: #ffffff15;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  #cell-id {
    position: fixed; bottom: 24px; right: 32px; z-index: 10;
    pointer-events: none; text-align: right;
  }
  #cell-id p {
    font-family: 'Lekton', monospace;
    font-size: 10px; color: #3D6DF430;
    letter-spacing: 0.06em;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <h1>ø co. / synthentific</h1>
  <p>scientific notation specimen · interactive</p>
</div>
<div id="cell-id">
  <p id="cellText">cell: --</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cellText = document.getElementById('cellText');
let W, H;
let mx = 0, my = 0, smx = 0, smy = 0;
let t = 0;

// IO Brand colors
const EH = '#3D6DF4';
const SE = '#F46138';
const PW = '#CE2867';
const SP = '#2C9FF4';
const DIM = 0.35;
const GLOW = 0.12;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

// Grid config
const COLS = 8;
const ROWS = 6;
const PAD = 2; // px padding around viewport

// Each cell gets a deterministic drawing function
// Seeded by cell index for consistency
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// Drawing primitives
function line(x1, y1, x2, y2, color, lw) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.stroke();
}
function circle(x, y, r, color, lw) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.stroke();
}
function dot(x, y, r, color) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
}
function rect(x, y, w, h, color, lw) {
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.strokeRect(x, y, w, h);
}

// 48 cell drawing functions
const cellDrawers = [
  // 0: Radial burst from center
  (cx, cy, s, inf, rng) => {
    const n = 24;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + t * 0.1 * inf;
      const r = s * 0.42;
      const c = i % 3 === 0 ? EH : `rgba(255,255,255,${0.08 + inf * 0.12})`;
      line(cx, cy, cx + Math.cos(a) * r, cy + Math.sin(a) * r, c, 0.6 + inf * 0.4);
    }
    dot(cx, cy, 2 + inf * 2, EH);
  },
  // 1: Concentric circles
  (cx, cy, s, inf, rng) => {
    const n = 7;
    for (let i = 1; i <= n; i++) {
      const r = (i / n) * s * 0.42 + Math.sin(t * 0.5 + i) * inf * 4;
      circle(cx, cy, r, i === n ? EH : `rgba(255,255,255,${0.06 + inf * 0.08})`, 0.6);
    }
  },
  // 2: Horizontal lines (hatching)
  (cx, cy, s, inf, rng) => {
    const n = 14;
    const half = s * 0.4;
    for (let i = 0; i < n; i++) {
      const y = cy - half + (i / (n - 1)) * half * 2;
      const wobble = Math.sin(t * 0.8 + i * 0.5) * inf * 8;
      line(cx - half, y + wobble, cx + half, y - wobble, `rgba(255,255,255,${0.06 + inf * 0.1})`, 0.6);
    }
  },
  // 3: Venn diagram (two overlapping circles)
  (cx, cy, s, inf, rng) => {
    const r = s * 0.25;
    const offset = s * 0.15 + Math.sin(t * 0.3) * inf * 10;
    circle(cx - offset, cy, r, EH, 0.8);
    circle(cx + offset, cy, r, SE, 0.8);
    dot(cx, cy, 2, '#fff');
  },
  // 4: Dot grid
  (cx, cy, s, inf, rng) => {
    const n = 6;
    const half = s * 0.35;
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        const x = cx - half + (i / (n - 1)) * half * 2;
        const y = cy - half + (j / (n - 1)) * half * 2;
        const dx = x - smx, dy = y - smy;
        const d = Math.sqrt(dx * dx + dy * dy);
        const pull = Math.max(0, 1 - d / (s * 1.5)) * inf * 6;
        const px = x + (dx / (d || 1)) * pull;
        const py = y + (dy / (d || 1)) * pull;
        dot(px, py, 1.5 + inf * 1, `rgba(61,109,244,${0.2 + inf * 0.5})`);
      }
    }
  },
  // 5: Sine wave
  (cx, cy, s, inf, rng) => {
    const half = s * 0.4;
    ctx.beginPath();
    for (let i = 0; i <= 60; i++) {
      const x = cx - half + (i / 60) * half * 2;
      const y = cy + Math.sin(i * 0.2 + t * 1.5) * s * 0.15 * (0.5 + inf * 0.8);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = EH; ctx.lineWidth = 0.8 + inf * 0.6; ctx.stroke();
    // Second harmonic
    ctx.beginPath();
    for (let i = 0; i <= 60; i++) {
      const x = cx - half + (i / 60) * half * 2;
      const y = cy + Math.sin(i * 0.4 + t * 1.2 + 1) * s * 0.1 * (0.5 + inf);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(244,97,56,${0.3 + inf * 0.4})`; ctx.lineWidth = 0.6; ctx.stroke();
  },
  // 6: Bar chart
  (cx, cy, s, inf, rng) => {
    const n = 8;
    const half = s * 0.35;
    const barW = (half * 2) / n * 0.7;
    for (let i = 0; i < n; i++) {
      const x = cx - half + (i / n) * half * 2 + barW * 0.3;
      const h = (rng() * 0.5 + 0.2 + Math.sin(t * 0.5 + i) * inf * 0.15) * half * 1.5;
      const c = i % 3 === 0 ? EH : i % 3 === 1 ? `rgba(255,255,255,${0.1 + inf * 0.15})` : SE;
      ctx.fillStyle = c;
      ctx.globalAlpha = 0.3 + inf * 0.5;
      ctx.fillRect(x, cy + half * 0.5 - h, barW, h);
      ctx.globalAlpha = 1;
    }
    line(cx - half, cy + half * 0.5, cx + half, cy + half * 0.5, `rgba(255,255,255,0.08)`, 0.5);
  },
  // 7: Crosshatch / angle lines
  (cx, cy, s, inf, rng) => {
    const half = s * 0.38;
    const n = 10;
    for (let i = 0; i < n; i++) {
      const offset = (i / n) * half * 2 - half;
      const ang = 0.3 + inf * 0.2;
      line(cx + offset, cy - half, cx + offset + Math.tan(ang) * half * 2, cy + half, `rgba(255,255,255,${0.04 + inf * 0.06})`, 0.5);
      line(cx - half, cy + offset, cx + half, cy + offset - Math.tan(ang) * half, `rgba(61,109,244,${0.04 + inf * 0.06})`, 0.5);
    }
  },
  // 8: Starburst dots
  (cx, cy, s, inf, rng) => {
    const n = 36;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const r = s * (0.1 + rng() * 0.3) + Math.sin(t + i * 0.3) * inf * 5;
      dot(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 1 + inf * 1.5, i % 4 === 0 ? EH : `rgba(255,255,255,${0.1 + inf * 0.2})`);
    }
  },
  // 9: Nested squares
  (cx, cy, s, inf, rng) => {
    const n = 6;
    for (let i = 0; i < n; i++) {
      const sz = s * 0.1 + (i / n) * s * 0.35;
      ctx.save(); ctx.translate(cx, cy);
      ctx.rotate(i * 0.05 + t * 0.05 * inf);
      rect(-sz, -sz, sz * 2, sz * 2, i % 2 === 0 ? `rgba(61,109,244,${0.1 + inf * 0.2})` : `rgba(255,255,255,${0.04 + inf * 0.08})`, 0.6);
      ctx.restore();
    }
  },
  // 10: Scatter plot
  (cx, cy, s, inf, rng) => {
    const half = s * 0.38;
    line(cx - half, cy + half, cx + half, cy + half, `rgba(255,255,255,0.06)`, 0.5);
    line(cx - half, cy - half, cx - half, cy + half, `rgba(255,255,255,0.06)`, 0.5);
    for (let i = 0; i < 20; i++) {
      const x = cx - half + rng() * half * 2;
      const y = cy + half - (rng() * 0.8 + 0.1) * half * 2;
      const jitter = Math.sin(t + i) * inf * 3;
      dot(x + jitter, y + jitter * 0.5, 1.5, i % 5 === 0 ? SE : `rgba(61,109,244,${0.3 + inf * 0.4})`);
    }
  },
  // 11: Rose curve
  (cx, cy, s, inf, rng) => {
    const k = 3 + Math.floor(inf * 2);
    const r = s * 0.38;
    ctx.beginPath();
    for (let i = 0; i <= 360; i++) {
      const a = (i / 360) * Math.PI * 2;
      const rr = r * Math.cos(k * a + t * 0.2);
      const x = cx + rr * Math.cos(a);
      const y = cy + rr * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = PW; ctx.lineWidth = 0.7 + inf * 0.4; ctx.stroke();
  },
  // 12: Spiral
  (cx, cy, s, inf, rng) => {
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const a = (i / 200) * Math.PI * 6 + t * 0.2;
      const r = (i / 200) * s * 0.4;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(61,109,244,${0.2 + inf * 0.5})`; ctx.lineWidth = 0.7; ctx.stroke();
  },
  // 13: Target / bullseye
  (cx, cy, s, inf, rng) => {
    for (let i = 5; i >= 0; i--) {
      const r = (i + 1) / 6 * s * 0.4 + Math.sin(t * 0.3 + i) * inf * 3;
      if (i % 2 === 0) {
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(244,97,56,${0.05 + inf * 0.08})`;
        ctx.fill();
      }
      circle(cx, cy, r, `rgba(255,255,255,${0.06 + inf * 0.08})`, 0.5);
    }
    line(cx - s * 0.42, cy, cx + s * 0.42, cy, `rgba(255,255,255,0.04)`, 0.5);
    line(cx, cy - s * 0.42, cx, cy + s * 0.42, `rgba(255,255,255,0.04)`, 0.5);
  },
  // 14: Lissajous
  (cx, cy, s, inf, rng) => {
    const a = 3, b = 2;
    ctx.beginPath();
    for (let i = 0; i <= 300; i++) {
      const angle = (i / 300) * Math.PI * 2;
      const x = cx + s * 0.35 * Math.sin(a * angle + t * 0.4);
      const y = cy + s * 0.25 * Math.sin(b * angle);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = SP; ctx.lineWidth = 0.6 + inf * 0.5; ctx.stroke();
  },
  // 15: Parallel curves (topographic)
  (cx, cy, s, inf, rng) => {
    const n = 8;
    for (let i = 0; i < n; i++) {
      ctx.beginPath();
      const offset = (i - n / 2) * s * 0.08;
      for (let j = 0; j <= 40; j++) {
        const x = cx - s * 0.38 + (j / 40) * s * 0.76;
        const y = cy + offset + Math.sin(j * 0.3 + i * 0.5 + t * 0.4) * s * 0.06 * (1 + inf);
        if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(61,109,244,${0.06 + inf * 0.12 + (i === 4 ? 0.15 : 0)})`;
      ctx.lineWidth = i === 4 ? 1 : 0.5; ctx.stroke();
    }
  },
  // 16: Fan / radial gradient lines
  (cx, cy, s, inf, rng) => {
    const n = 16;
    const r = s * 0.42;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI - Math.PI / 2;
      const len = r * (0.5 + rng() * 0.5 + inf * 0.2);
      line(cx, cy + s * 0.3, cx + Math.cos(a) * len, cy + s * 0.3 + Math.sin(a) * len,
        `rgba(255,255,255,${0.04 + inf * 0.08 + (i % 4 === 0 ? 0.06 : 0)})`, 0.6);
    }
  },
  // 17: Trefoil / clover
  (cx, cy, s, inf, rng) => {
    for (let p = 0; p < 3; p++) {
      const angle = (p / 3) * Math.PI * 2 + t * 0.1;
      const ox = Math.cos(angle) * s * 0.15;
      const oy = Math.sin(angle) * s * 0.15;
      circle(cx + ox, cy + oy, s * 0.18 + inf * 4, p === 0 ? EH : p === 1 ? SE : PW, 0.7);
    }
  },
  // 18: Arrow field
  (cx, cy, s, inf, rng) => {
    const n = 4;
    const half = s * 0.32;
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        const x = cx - half + (i / (n - 1)) * half * 2;
        const y = cy - half + (j / (n - 1)) * half * 2;
        const dx = smx - x, dy = smy - y;
        const a = Math.atan2(dy, dx);
        const len = 6 + inf * 8;
        line(x, y, x + Math.cos(a) * len, y + Math.sin(a) * len, `rgba(61,109,244,${0.15 + inf * 0.3})`, 0.6);
        dot(x + Math.cos(a) * len, y + Math.sin(a) * len, 1, EH);
      }
    }
  },
  // 19: Ellipse cluster
  (cx, cy, s, inf, rng) => {
    for (let i = 0; i < 5; i++) {
      ctx.save(); ctx.translate(cx, cy);
      ctx.rotate(i * Math.PI / 5 + t * 0.05);
      ctx.scale(1, 0.4 + i * 0.1);
      circle(0, 0, s * 0.3 + inf * 5, `rgba(61,109,244,${0.08 + inf * 0.1})`, 0.5);
      ctx.restore();
    }
  },
  // 20: Vertical bars / spectrum
  (cx, cy, s, inf, rng) => {
    const n = 16;
    const half = s * 0.38;
    for (let i = 0; i < n; i++) {
      const x = cx - half + (i / n) * half * 2;
      const h = (Math.sin(i * 0.6 + t * 0.8) * 0.3 + 0.5 + inf * 0.2) * half;
      const hue = i / n;
      const c = hue < 0.33 ? EH : hue < 0.66 ? SP : SE;
      ctx.globalAlpha = 0.15 + inf * 0.3;
      ctx.fillStyle = c;
      ctx.fillRect(x, cy - h / 2, half * 2 / n * 0.6, h);
      ctx.globalAlpha = 1;
    }
  },
  // 21: Hexagon
  (cx, cy, s, inf, rng) => {
    for (let h = 0; h < 3; h++) {
      const r = s * (0.15 + h * 0.1) + Math.sin(t * 0.3 + h) * inf * 4;
      ctx.beginPath();
      for (let i = 0; i <= 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6 + t * 0.02 * h;
        const x = cx + r * Math.cos(a);
        const y = cy + r * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = h === 0 ? EH : `rgba(255,255,255,${0.06 + inf * 0.1})`;
      ctx.lineWidth = 0.6; ctx.stroke();
    }
  },
  // 22: Dashed circle
  (cx, cy, s, inf, rng) => {
    const r = s * 0.35;
    const n = 24;
    for (let i = 0; i < n; i++) {
      const a1 = (i / n) * Math.PI * 2 + t * 0.1;
      const a2 = a1 + (0.7 / n) * Math.PI * 2;
      ctx.beginPath(); ctx.arc(cx, cy, r, a1, a2);
      ctx.strokeStyle = i % 6 === 0 ? SE : `rgba(255,255,255,${0.08 + inf * 0.12})`;
      ctx.lineWidth = 1 + inf * 0.5; ctx.stroke();
    }
    dot(cx, cy, 1.5, EH);
  },
  // 23: Perspective grid
  (cx, cy, s, inf, rng) => {
    const half = s * 0.4;
    const vanish = cy - half * 0.8;
    const n = 8;
    for (let i = 0; i <= n; i++) {
      const x = cx - half + (i / n) * half * 2;
      line(x, cy + half * 0.6, cx + (x - cx) * 0.3, vanish, `rgba(255,255,255,${0.04 + inf * 0.06})`, 0.5);
    }
    for (let i = 0; i < 5; i++) {
      const y = cy + half * 0.6 - (i / 5) * half * 1.2;
      const spread = 1 - (i / 5) * 0.7;
      line(cx - half * spread, y, cx + half * spread, y, `rgba(61,109,244,${0.04 + inf * 0.08})`, 0.5);
    }
  },
  // 24: Noise dots
  (cx, cy, s, inf, rng) => {
    for (let i = 0; i < 40; i++) {
      const x = cx + (rng() - 0.5) * s * 0.8;
      const y = cy + (rng() - 0.5) * s * 0.8;
      const phase = Math.sin(t * 0.5 + rng() * 10) * inf * 4;
      dot(x + phase, y + phase * 0.7, 0.8 + rng() * 1.5, `rgba(61,109,244,${0.1 + inf * 0.3})`);
    }
  },
  // 25: Parabola
  (cx, cy, s, inf, rng) => {
    const half = s * 0.38;
    ctx.beginPath();
    for (let i = 0; i <= 50; i++) {
      const xt = (i / 50) * 2 - 1;
      const x = cx + xt * half;
      const y = cy + half * 0.3 - xt * xt * half * 0.8 * (1 + inf * 0.3);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = SE; ctx.lineWidth = 0.7 + inf * 0.4; ctx.stroke();
    // Axis
    line(cx - half, cy + half * 0.3, cx + half, cy + half * 0.3, `rgba(255,255,255,0.04)`, 0.5);
    line(cx, cy - half, cx, cy + half, `rgba(255,255,255,0.04)`, 0.5);
  },
  // 26: Moiré circles
  (cx, cy, s, inf, rng) => {
    const ox = Math.sin(t * 0.2) * inf * 8;
    for (let i = 1; i <= 8; i++) {
      circle(cx, cy, i * s * 0.05, `rgba(255,255,255,0.05)`, 0.4);
      circle(cx + ox, cy + ox * 0.5, i * s * 0.05, `rgba(61,109,244,${0.04 + inf * 0.05})`, 0.4);
    }
  },
  // 27: Cross
  (cx, cy, s, inf, rng) => {
    const r = s * 0.38;
    const w = s * 0.08 + inf * 4;
    ctx.fillStyle = `rgba(61,109,244,${0.1 + inf * 0.2})`;
    ctx.fillRect(cx - w / 2, cy - r, w, r * 2);
    ctx.fillRect(cx - r, cy - w / 2, r * 2, w);
    circle(cx, cy, s * 0.12, `rgba(244,97,56,${0.2 + inf * 0.3})`, 0.6);
  },
  // 28: Diamond lattice
  (cx, cy, s, inf, rng) => {
    const n = 4;
    const sp = s * 0.2;
    for (let i = -n; i <= n; i++) {
      for (let j = -n; j <= n; j++) {
        if (Math.abs(i) + Math.abs(j) > n) continue;
        const x = cx + i * sp * 0.7 + j * sp * 0.7;
        const y = cy + i * sp * 0.4 - j * sp * 0.4;
        dot(x, y, 1 + inf * 1.2, (i + j) % 2 === 0 ? `rgba(61,109,244,${0.2 + inf * 0.4})` : `rgba(255,255,255,${0.06 + inf * 0.1})`);
      }
    }
  },
  // 29: Oscillating rectangles
  (cx, cy, s, inf, rng) => {
    for (let i = 0; i < 5; i++) {
      const w = s * 0.6 * (1 - i * 0.15);
      const h = s * 0.05 + Math.sin(t * 0.6 + i * 0.8) * inf * s * 0.05;
      const y = cy - s * 0.3 + i * s * 0.13;
      ctx.strokeStyle = `rgba(61,109,244,${0.08 + inf * 0.12})`;
      ctx.lineWidth = 0.5;
      ctx.strokeRect(cx - w / 2, y, w, h + s * 0.04);
    }
  },
  // 30: Tangent lines to circle
  (cx, cy, s, inf, rng) => {
    const r = s * 0.25;
    circle(cx, cy, r, `rgba(255,255,255,${0.08 + inf * 0.12})`, 0.6);
    const n = 8;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + t * 0.15;
      const px = cx + r * Math.cos(a);
      const py = cy + r * Math.sin(a);
      const ta = a + Math.PI / 2;
      const len = s * 0.25;
      line(px - Math.cos(ta) * len, py - Math.sin(ta) * len,
           px + Math.cos(ta) * len, py + Math.sin(ta) * len,
           `rgba(61,109,244,${0.06 + inf * 0.1})`, 0.5);
    }
  },
  // 31: Half-tone gradient
  (cx, cy, s, inf, rng) => {
    const cols = 10, rows = 10;
    const half = s * 0.38;
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        const x = cx - half + (i / (cols - 1)) * half * 2;
        const y = cy - half + (j / (rows - 1)) * half * 2;
        const size = (i / cols) * 2.5 + 0.5 + Math.sin(t + i + j) * inf * 0.5;
        dot(x, y, size, `rgba(61,109,244,${0.1 + inf * 0.2})`);
      }
    }
  },
  // 32: Sawtooth wave
  (cx, cy, s, inf, rng) => {
    const half = s * 0.38;
    const n = 8;
    ctx.beginPath();
    for (let i = 0; i <= n * 2; i++) {
      const x = cx - half + (i / (n * 2)) * half * 2;
      const y = (i % 2 === 0) ? cy - s * 0.15 * (1 + inf * 0.5) : cy + s * 0.15 * (1 + inf * 0.5);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = SE; ctx.lineWidth = 0.7; ctx.stroke();
  },
  // 33: Atom / orbits
  (cx, cy, s, inf, rng) => {
    for (let i = 0; i < 3; i++) {
      ctx.save(); ctx.translate(cx, cy);
      ctx.rotate(i * Math.PI / 3 + t * 0.08);
      ctx.scale(1, 0.35);
      circle(0, 0, s * 0.35, `rgba(61,109,244,${0.1 + inf * 0.15})`, 0.6);
      const a = t * (0.5 + i * 0.2);
      dot(s * 0.35 * Math.cos(a), s * 0.35 * Math.sin(a), 2, EH);
      ctx.restore();
    }
    dot(cx, cy, 3 + inf * 2, SE);
  },
  // 34: Triangle
  (cx, cy, s, inf, rng) => {
    const r = s * 0.35;
    for (let h = 0; h < 3; h++) {
      ctx.beginPath();
      const rr = r * (0.5 + h * 0.25) + Math.sin(t * 0.3) * inf * 3;
      for (let i = 0; i <= 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2 + h * 0.05;
        const x = cx + rr * Math.cos(a);
        const y = cy + rr * Math.sin(a) + s * 0.05;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = h === 0 ? EH : `rgba(255,255,255,${0.05 + inf * 0.08})`;
      ctx.lineWidth = 0.6; ctx.stroke();
    }
  },
  // 35: Dumbbell / connected dots
  (cx, cy, s, inf, rng) => {
    const spread = s * 0.28 + Math.sin(t * 0.4) * inf * 8;
    dot(cx - spread, cy, 8 + inf * 4, `rgba(61,109,244,${0.15 + inf * 0.25})`);
    dot(cx + spread, cy, 8 + inf * 4, `rgba(244,97,56,${0.15 + inf * 0.25})`);
    line(cx - spread, cy, cx + spread, cy, `rgba(255,255,255,${0.06 + inf * 0.1})`, 0.8);
    dot(cx, cy, 2, '#fff');
  },
  // 36: Step function
  (cx, cy, s, inf, rng) => {
    const half = s * 0.38;
    ctx.beginPath();
    const steps = 6;
    for (let i = 0; i <= steps; i++) {
      const x1 = cx - half + (i / steps) * half * 2;
      const x2 = cx - half + ((i + 1) / steps) * half * 2;
      const y = cy + (rng() - 0.5) * half * 0.8 + Math.sin(t * 0.3 + i) * inf * 6;
      if (i === 0) ctx.moveTo(x1, y);
      else { ctx.lineTo(x1, y); }
      if (i < steps) ctx.lineTo(x2, y);
    }
    ctx.strokeStyle = EH; ctx.lineWidth = 0.8; ctx.stroke();
  },
  // 37: Sunburst sectors
  (cx, cy, s, inf, rng) => {
    const n = 12;
    const r = s * 0.4;
    for (let i = 0; i < n; i++) {
      if (i % 2 === 0) continue;
      const a1 = (i / n) * Math.PI * 2 + t * 0.05;
      const a2 = ((i + 1) / n) * Math.PI * 2 + t * 0.05;
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, a1, a2);
      ctx.closePath();
      ctx.fillStyle = `rgba(61,109,244,${0.04 + inf * 0.08})`;
      ctx.fill();
    }
    circle(cx, cy, r * 0.3, `rgba(255,255,255,${0.06 + inf * 0.1})`, 0.5);
  },
  // 38: Network / graph
  (cx, cy, s, inf, rng) => {
    const nodes = [];
    for (let i = 0; i < 7; i++) {
      nodes.push({
        x: cx + (rng() - 0.5) * s * 0.7,
        y: cy + (rng() - 0.5) * s * 0.7
      });
    }
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        if (rng() > 0.5) continue;
        line(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y, `rgba(61,109,244,${0.06 + inf * 0.1})`, 0.4);
      }
      dot(nodes[i].x, nodes[i].y, 2 + inf * 1.5, i === 0 ? SE : EH);
    }
  },
  // 39: Frequency comb
  (cx, cy, s, inf, rng) => {
    const n = 20;
    const half = s * 0.38;
    for (let i = 0; i < n; i++) {
      const x = cx - half + (i / n) * half * 2;
      const h = (Math.sin(i * 0.8 + t * 0.6) * 0.5 + 0.5) * half * 0.8 * (0.5 + inf * 0.8);
      line(x, cy, x, cy - h, `rgba(61,109,244,${0.1 + inf * 0.2})`, 0.8);
      dot(x, cy - h, 1, EH);
    }
    line(cx - half, cy, cx + half, cy, `rgba(255,255,255,0.04)`, 0.5);
  },
  // 40: Cardioid
  (cx, cy, s, inf, rng) => {
    const a = s * 0.15;
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const angle = (i / 200) * Math.PI * 2;
      const r = a * (1 + Math.cos(angle)) * (1 + inf * 0.3);
      const x = cx + r * Math.cos(angle + t * 0.1);
      const y = cy + r * Math.sin(angle + t * 0.1);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = PW; ctx.lineWidth = 0.7; ctx.stroke();
  },
  // 41: Checkerboard
  (cx, cy, s, inf, rng) => {
    const n = 6;
    const half = s * 0.36;
    const cell = (half * 2) / n;
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        if ((i + j) % 2 === 0) {
          const x = cx - half + i * cell;
          const y = cy - half + j * cell;
          ctx.fillStyle = `rgba(61,109,244,${0.03 + inf * 0.06})`;
          ctx.fillRect(x, y, cell, cell);
        }
      }
    }
    rect(cx - half, cy - half, half * 2, half * 2, `rgba(255,255,255,0.04)`, 0.5);
  },
  // 42: Zigzag
  (cx, cy, s, inf, rng) => {
    const half = s * 0.38;
    for (let w = 0; w < 3; w++) {
      ctx.beginPath();
      const yoff = (w - 1) * s * 0.12;
      for (let i = 0; i <= 12; i++) {
        const x = cx - half + (i / 12) * half * 2;
        const y = cy + yoff + (i % 2 === 0 ? -1 : 1) * s * 0.08 * (1 + inf * 0.5);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = w === 1 ? EH : `rgba(255,255,255,${0.05 + inf * 0.08})`;
      ctx.lineWidth = 0.6; ctx.stroke();
    }
  },
  // 43: Pie chart
  (cx, cy, s, inf, rng) => {
    const slices = [0.3, 0.25, 0.2, 0.15, 0.1];
    const colors = [EH, SE, PW, SP, `rgba(255,255,255,0.15)`];
    let start = t * 0.1;
    const r = s * 0.35;
    for (let i = 0; i < slices.length; i++) {
      const end = start + slices[i] * Math.PI * 2;
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r + (i === 0 ? inf * 4 : 0), start, end);
      ctx.closePath();
      ctx.fillStyle = colors[i];
      ctx.globalAlpha = 0.1 + inf * 0.15;
      ctx.fill(); ctx.globalAlpha = 1;
      ctx.strokeStyle = `rgba(10,10,10,0.5)`;
      ctx.lineWidth = 1; ctx.stroke();
      start = end;
    }
  },
  // 44: Fibonacci spiral dots
  (cx, cy, s, inf, rng) => {
    const golden = 2.399963;
    for (let i = 0; i < 60; i++) {
      const a = i * golden + t * 0.05;
      const r = Math.sqrt(i) * s * 0.05;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      dot(x, y, 1 + inf * 1 + (i % 8 === 0 ? 1 : 0), i % 8 === 0 ? SE : `rgba(61,109,244,${0.15 + inf * 0.25})`);
    }
  },
  // 45: Bracket / curly brace shape
  (cx, cy, s, inf, rng) => {
    const h = s * 0.35;
    // Left brace
    ctx.beginPath();
    ctx.moveTo(cx - s * 0.1, cy - h);
    ctx.quadraticCurveTo(cx - s * 0.2 - inf * 5, cy, cx - s * 0.1, cy + h);
    ctx.strokeStyle = EH; ctx.lineWidth = 0.8; ctx.stroke();
    // Right brace
    ctx.beginPath();
    ctx.moveTo(cx + s * 0.1, cy - h);
    ctx.quadraticCurveTo(cx + s * 0.2 + inf * 5, cy, cx + s * 0.1, cy + h);
    ctx.strokeStyle = SE; ctx.lineWidth = 0.8; ctx.stroke();
    dot(cx, cy, 2, '#fff');
  },
  // 46: Gaussian curve
  (cx, cy, s, inf, rng) => {
    const half = s * 0.38;
    ctx.beginPath();
    for (let i = 0; i <= 60; i++) {
      const xt = (i / 60) * 2 - 1;
      const x = cx + xt * half;
      const y = cy + half * 0.3 - Math.exp(-xt * xt * (3 + inf * 2)) * half * 0.6;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = SP; ctx.lineWidth = 0.8 + inf * 0.4; ctx.stroke();
    // Shading
    ctx.globalAlpha = 0.03 + inf * 0.05;
    ctx.fillStyle = SP;
    ctx.lineTo(cx + half, cy + half * 0.3);
    ctx.lineTo(cx - half, cy + half * 0.3);
    ctx.fill();
    ctx.globalAlpha = 1;
  },
  // 47: Double helix
  (cx, cy, s, inf, rng) => {
    const half = s * 0.38;
    for (let strand = 0; strand < 2; strand++) {
      ctx.beginPath();
      for (let i = 0; i <= 50; i++) {
        const y = cy - half + (i / 50) * half * 2;
        const phase = strand * Math.PI + t * 0.5;
        const x = cx + Math.sin(i * 0.3 + phase) * s * 0.15 * (1 + inf * 0.5);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = strand === 0 ? EH : SE;
      ctx.lineWidth = 0.7 + inf * 0.3; ctx.stroke();
    }
    // Rungs
    for (let i = 0; i < 8; i++) {
      const y = cy - half + (i / 8 + 0.06) * half * 2;
      const idx = i * 50 / 8;
      const x1 = cx + Math.sin(idx * 0.3 + t * 0.5) * s * 0.15;
      const x2 = cx + Math.sin(idx * 0.3 + Math.PI + t * 0.5) * s * 0.15;
      line(x1, y, x2, y, `rgba(255,255,255,${0.04 + inf * 0.06})`, 0.4);
    }
  },
];

function animate() {
  t += 0.016;
  smx += (mx - smx) * 0.08;
  smy += (my - smy) * 0.08;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, W, H);

  const cellW = (W - PAD * 2) / COLS;
  const cellH = (H - PAD * 2) / ROWS;
  const cellSize = Math.min(cellW, cellH);

  // Draw grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    const x = PAD + i * cellW;
    ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, H - PAD); ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    const y = PAD + j * cellH;
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
  }

  // Draw cells
  let hoveredCell = -1;
  for (let j = 0; j < ROWS; j++) {
    for (let i = 0; i < COLS; i++) {
      const idx = j * COLS + i;
      if (idx >= cellDrawers.length) continue;

      const cx = PAD + (i + 0.5) * cellW;
      const cy = PAD + (j + 0.5) * cellH;
      const s = Math.min(cellW, cellH);

      // Influence based on mouse proximity
      const dx = smx - cx;
      const dy = smy - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const inf = Math.max(0, 1 - dist / (s * 1.8));

      // Hovered cell detection
      if (Math.abs(mx - cx) < cellW / 2 && Math.abs(my - cy) < cellH / 2) {
        hoveredCell = idx;
      }

      // Cell background glow on hover
      if (inf > 0.3) {
        ctx.fillStyle = `rgba(61,109,244,${(inf - 0.3) * 0.03})`;
        ctx.fillRect(PAD + i * cellW, PAD + j * cellH, cellW, cellH);
      }

      const rng = seededRandom(idx * 7919 + 42);
      cellDrawers[idx](cx, cy, s, inf, rng);
    }
  }

  // Update HUD
  if (hoveredCell >= 0) {
    const col = hoveredCell % COLS;
    const row = Math.floor(hoveredCell / COLS);
    cellText.textContent = `cell: ${String(row).padStart(2, '0')}.${String(col).padStart(2, '0')} / ${String(hoveredCell).padStart(2, '0')}`;
  } else {
    cellText.textContent = 'cell: --';
  }

  requestAnimationFrame(animate);
}

mx = W / 2; my = H / 2; smx = mx; smy = my;
animate();
</script>
