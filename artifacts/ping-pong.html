<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Pong</title>
<link href="https://fonts.googleapis.com/css2?family=Lekton:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; overflow: hidden; font-family: 'Lekton', monospace; cursor: none; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 48px; z-index: 10; pointer-events: none;
  }
  .score {
    font-size: 64px; font-weight: 700; letter-spacing: -2px;
    line-height: 1; transition: opacity 0.15s;
  }
  #score-l { color: #F46138; }
  #score-r { color: #3D6DF4; }
  #hud-center {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  #title-text {
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: #ffffff; opacity: 0.2;
  }
  #controls-hint {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #ffffff; opacity: 0.1;
  }
  #overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: rgba(10,10,10,0.85);
  }
  #overlay h2 {
    font-size: 13px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: #ffffff; opacity: 0.5;
  }
  #overlay-winner {
    font-size: 48px; font-weight: 700; letter-spacing: -1px;
  }
  #overlay-sub {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: #ffffff; opacity: 0.25; margin-top: 8px;
  }
  #overlay.hidden { display: none; }
  #scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 1px,
      rgba(255,255,255,0.006) 1px, rgba(255,255,255,0.006) 2px);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scanlines"></div>

<div id="hud">
  <div class="score" id="score-l">0</div>
  <div id="hud-center">
    <div id="title-text">ø co. / ping pong</div>
    <div id="controls-hint">W·S &nbsp;·&nbsp; ↑·↓</div>
  </div>
  <div class="score" id="score-r">0</div>
</div>

<div id="overlay">
  <div id="overlay-winner" style="color:#F46138">serve to start</div>
  <div id="overlay-sub">press space · w/s + ↑/↓ to play</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayWinner = document.getElementById('overlay-winner');
const overlaySub = document.getElementById('overlay-sub');
const scoreL = document.getElementById('score-l');
const scoreR = document.getElementById('score-r');

const SE = '#F46138';
const EH = '#3D6DF4';
const PW = '#CE2867';

let W, H;
function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// --- AUDIO ---
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, vol = 0.15, type = 'square') {
  const ac = ensureAudio();
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  osc.connect(g); g.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + dur);
}

// --- GAME STATE ---
const PADDLE_W = 8;
const PADDLE_H = 80;
const PADDLE_MARGIN = 48;
const BALL_R = 7;
const WIN_SCORE = 7;
const SPEED_BASE = 6;
const SPEED_INC = 0.25;

let gameState = 'start'; // start | playing | scored | won
let scores = { l: 0, r: 0 };

let paddles = {
  l: { y: 0, vy: 0, score: 0 },
  r: { y: 0, vy: 0, score: 0 }
};

let ball = { x: 0, y: 0, vx: 0, vy: 0, speed: SPEED_BASE };
let trail = [];
let sparks = [];
let flashTimer = 0;
let flashSide = null;

const keys = {};
addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') {
    if (gameState === 'start' || gameState === 'scored' || gameState === 'won') startRound();
  }
});
addEventListener('keyup', e => { keys[e.key] = false; });

function initGame() {
  paddles.l.y = H / 2;
  paddles.r.y = H / 2;
  scores.l = 0; scores.r = 0;
  scoreL.textContent = 0; scoreR.textContent = 0;
  gameState = 'start';
  showOverlay('serve to start', 'press space · w/s + ↑/↓ to play', SE);
}

function startRound() {
  ensureAudio();
  ball.x = W / 2;
  ball.y = H / 2;
  const angle = (Math.random() * 0.6 - 0.3) + (Math.random() > 0.5 ? 0 : Math.PI);
  ball.speed = SPEED_BASE;
  ball.vx = Math.cos(angle) * ball.speed;
  ball.vy = Math.sin(angle) * ball.speed;
  trail = [];
  sparks = [];
  flashTimer = 0;
  gameState = 'playing';
  overlay.classList.add('hidden');
  beep(220, 0.1);
}

function showOverlay(title, sub, color) {
  overlayWinner.textContent = title;
  overlayWinner.style.color = color;
  overlaySub.textContent = sub;
  overlay.classList.remove('hidden');
}

function spawnSparks(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    sparks.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 1, color });
  }
}

// --- UPDATE ---
let t = 0;
function update() {
  t += 0.016;

  const PADDLE_SPEED = 7;

  // Paddle movement
  if (keys['w'] || keys['W']) paddles.l.y -= PADDLE_SPEED;
  if (keys['s'] || keys['S']) paddles.l.y += PADDLE_SPEED;
  if (keys['ArrowUp']) paddles.r.y -= PADDLE_SPEED;
  if (keys['ArrowDown']) paddles.r.y += PADDLE_SPEED;

  // Clamp paddles
  const ph = PADDLE_H / 2;
  paddles.l.y = Math.max(ph, Math.min(H - ph, paddles.l.y));
  paddles.r.y = Math.max(ph, Math.min(H - ph, paddles.r.y));

  if (gameState !== 'playing') return;

  // Ball trail
  trail.push({ x: ball.x, y: ball.y, life: 1 });
  if (trail.length > 18) trail.shift();
  trail.forEach(p => p.life *= 0.88);

  // Ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Top / bottom bounce
  if (ball.y - BALL_R <= 0) {
    ball.y = BALL_R;
    ball.vy = Math.abs(ball.vy);
    beep(180, 0.06, 0.08);
    spawnSparks(ball.x, ball.y, '#ffffff', 5);
  }
  if (ball.y + BALL_R >= H) {
    ball.y = H - BALL_R;
    ball.vy = -Math.abs(ball.vy);
    beep(180, 0.06, 0.08);
    spawnSparks(ball.x, ball.y, '#ffffff', 5);
  }

  // Paddle collision — left
  const lx = PADDLE_MARGIN + PADDLE_W;
  if (ball.x - BALL_R <= lx && ball.x - BALL_R >= lx - PADDLE_W * 2 && ball.vx < 0) {
    if (ball.y >= paddles.l.y - ph && ball.y <= paddles.l.y + ph) {
      ball.x = lx + BALL_R;
      const hit = (ball.y - paddles.l.y) / ph; // -1 to 1
      const angle = hit * (Math.PI / 3.5);
      ball.speed = Math.min(ball.speed + SPEED_INC, 18);
      ball.vx = Math.cos(angle) * ball.speed;
      ball.vy = Math.sin(angle) * ball.speed;
      beep(300 + Math.abs(hit) * 100, 0.08, 0.15);
      spawnSparks(ball.x, ball.y, SE, 14);
      flashTimer = 6; flashSide = 'l';
    }
  }

  // Paddle collision — right
  const rx = W - PADDLE_MARGIN - PADDLE_W;
  if (ball.x + BALL_R >= rx && ball.x + BALL_R <= rx + PADDLE_W * 2 && ball.vx > 0) {
    if (ball.y >= paddles.r.y - ph && ball.y <= paddles.r.y + ph) {
      ball.x = rx - BALL_R;
      const hit = (ball.y - paddles.r.y) / ph;
      const angle = Math.PI - hit * (Math.PI / 3.5);
      ball.speed = Math.min(ball.speed + SPEED_INC, 18);
      ball.vx = Math.cos(angle) * ball.speed;
      ball.vy = Math.sin(angle) * ball.speed;
      beep(300 + Math.abs(hit) * 100, 0.08, 0.15);
      spawnSparks(ball.x, ball.y, EH, 14);
      flashTimer = 6; flashSide = 'r';
    }
  }

  // Score
  if (ball.x < -BALL_R * 2) {
    scores.r++;
    scoreR.textContent = scores.r;
    beep(100, 0.3, 0.2, 'sine');
    spawnSparks(0, ball.y, EH, 20);
    checkWin('r');
  }
  if (ball.x > W + BALL_R * 2) {
    scores.l++;
    scoreL.textContent = scores.l;
    beep(100, 0.3, 0.2, 'sine');
    spawnSparks(W, ball.y, SE, 20);
    checkWin('l');
  }

  // Sparks
  sparks.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.vx *= 0.92; s.vy *= 0.92;
    s.life -= 0.04;
  });
  sparks = sparks.filter(s => s.life > 0);

  if (flashTimer > 0) flashTimer--;
}

function checkWin(side) {
  if (scores[side] >= WIN_SCORE) {
    gameState = 'won';
    const name = side === 'l' ? 'player one' : 'player two';
    const color = side === 'l' ? SE : EH;
    beep(440, 0.1); setTimeout(() => beep(550, 0.1), 120); setTimeout(() => beep(660, 0.3), 240);
    showOverlay(name + ' wins', 'space to play again', color);
    scores.l = 0; scores.r = 0;
    scoreL.textContent = 0; scoreR.textContent = 0;
  } else {
    gameState = 'scored';
    showOverlay('', 'space to continue', gameState === 'l' ? SE : EH);
    overlayWinner.textContent = '';
  }
}

// --- DRAW ---
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, W, H);

  // Flash on paddle hit
  if (flashTimer > 0) {
    const alpha = (flashTimer / 6) * 0.06;
    ctx.fillStyle = flashSide === 'l' ? SE : EH;
    ctx.globalAlpha = alpha;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // Center line — dashed
  ctx.setLineDash([6, 10]);
  ctx.strokeStyle = '#ffffff';
  ctx.globalAlpha = 0.04;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const p = trail[i];
    const frac = i / trail.length;
    const r = BALL_R * frac * 0.8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, r), 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = p.life * frac * 0.25;
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Sparks
  sparks.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.globalAlpha = s.life * 0.8;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Ball
  if (gameState === 'playing') {
    // Glow
    const grd = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, BALL_R * 3);
    grd.addColorStop(0, 'rgba(255,255,255,0.15)');
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R * 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.95;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Paddles
  const drawPaddle = (x, y, color) => {
    const ph = PADDLE_H / 2;
    // Glow
    const gr = ctx.createLinearGradient(x, y - ph, x, y + ph);
    gr.addColorStop(0, color + '00');
    gr.addColorStop(0.5, color + '30');
    gr.addColorStop(1, color + '00');
    ctx.fillStyle = gr;
    ctx.fillRect(x - 20, y - ph, 40, PADDLE_H);

    // Body
    ctx.beginPath();
    ctx.roundRect(x - PADDLE_W / 2, y - ph, PADDLE_W, PADDLE_H, 3);
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.9;
    ctx.fill();
    ctx.globalAlpha = 1;
  };

  drawPaddle(PADDLE_MARGIN + PADDLE_W / 2, paddles.l.y, SE);
  drawPaddle(W - PADDLE_MARGIN - PADDLE_W / 2, paddles.r.y, EH);
}

// --- LOOP ---
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
</body>
</html>
